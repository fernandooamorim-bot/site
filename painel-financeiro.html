  <style>
    /* ============================================
       GLOBAL NAV — FA PRODUÇÕES Design System
       ============================================ */
    :root {
      --nav-navy-900: #0a1628;
      --nav-navy-800: #0f1a2e;
      --nav-navy-700: #142240;
      --nav-navy-600: #1e3a5f;
      --nav-gold-500: #d4a853;
      --nav-gold-400: #e0bc6a;
      --nav-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --nav-height: 68px;
      --nav-radius-md: 12px;
      --nav-radius-sm: 8px;
      --nav-radius-full: 999px;
    }

    .global-header {
      background: var(--nav-navy-800);
      color: white;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 200;
      font-family: var(--nav-font);
    }

    .global-header-brand {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      text-decoration: none; transition: opacity 0.2s;
    }
    .global-header-brand:hover { opacity: 0.85; }

    .global-header-back {
      width: 32px; height: 32px; border-radius: var(--nav-radius-sm);
      background: rgba(255,255,255,0.08); display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.2s;
    }
    .global-header-brand:hover .global-header-back { background: rgba(212,168,83,0.15); }
    .global-header-back i { color: var(--nav-gold-400); width: 18px; height: 18px; }

    .global-header-title {
      font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 8px;
    }
    .global-header-title i { width: 20px; height: 20px; color: var(--nav-gold-400); }

    .global-header-user {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 12px 4px 4px; background: rgba(255,255,255,0.06);
      border-radius: var(--nav-radius-full); border: 1px solid rgba(255,255,255,0.08);
      font-family: var(--nav-font);
    }

    .global-header-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--nav-navy-600), rgba(58,96,152,0.8));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--nav-gold-400); text-transform: uppercase;
    }

    .global-header-name {
      color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600;
      max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .global-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .global-header-logout {
      width: 32px;
      height: 32px;
      border-radius: var(--nav-radius-sm);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .global-header-logout i,
    .global-header-logout svg {
      width: 17px;
      height: 17px;
      color: rgba(255,255,255,0.8);
    }

    .global-header-logout:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.35);
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-height) + env(safe-area-inset-bottom) + 10px); background: var(--nav-navy-800);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: flex-start; justify-content: space-evenly;
      z-index: 200; padding: 0 8px calc(env(safe-area-inset-bottom) + 16px);
      border-radius: 0;
      font-family: var(--nav-font);
    }

    .bnav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      padding: 2px 10px 8px; min-height: 52px; min-width: 62px; border-radius: 14px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      text-decoration: none; border: none; background: none; transition: all 0.2s;
    }
    .bnav-item i, .bnav-item svg { width: 22px; height: 22px; color: rgba(255,255,255,0.9); stroke: currentColor; fill: none; transition: color 0.2s; }
    .bnav-item span { font-family: var(--nav-font); font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.9); transition: color 0.2s; line-height: 1; }
    .bnav-item.active i, .bnav-item:hover i { color: var(--nav-gold-400); }
    .bnav-item.active span, .bnav-item:hover span { color: var(--nav-gold-400); }
    .bnav-item.active { background: rgba(212,168,83,0.08); }

    @media (min-width: 768px) { .bottom-nav { display: none; } body { padding-bottom: 0 !important; } }
    @media (max-width: 767px) { body { padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 12px) !important; } }
  </style>

  <style>
    /* ============================================
       DESIGN SYSTEM — FA PRODUÇÕES (painel-financeiro)
       ============================================ */
    :root {
      --navy-900: #0a1628;
      --navy-800: #0f1a2e;
      --navy-700: #142240;
      --navy-600: #1e3a5f;
      --navy-500: #264a7a;
      --navy-400: #3a6098;
      --gold-600: #b8903e;
      --gold-500: #d4a853;
      --gold-400: #e0bc6a;
      --gold-300: #ebd08c;
      --gray-50: #f8f9fc;
      --gray-100: #f1f3f8;
      --gray-200: #e2e6ef;
      --gray-300: #cdd3e0;
      --gray-400: #9ca3b8;
      --gray-500: #6b7490;
      --gray-600: #4a5268;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(10,22,40,0.06);
      --shadow-md: 0 4px 16px rgba(10,22,40,0.08);
      --shadow-lg: 0 8px 32px rgba(10,22,40,0.14);

      /* Semantic aliases used by JS-generated classes */
      --primary: #1e3a5f;
      --secondary: #264a7a;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray: #e2e6ef;
      --dark: #1f2937;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--gray-50);
      color: var(--gray-800);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================
       OLD HEADER (hidden, global-header replaces it)
       ============================================ */
    body > header {
      display: none;
    }

    /* ============================================
       MAIN CONTENT AREA
       ============================================ */
    .filtros,
    .modo-visual,
    .lista {
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
      padding-left: 20px;
      padding-right: 20px;
    }

    @media (min-width: 768px) {
      .filtros, .modo-visual, .lista {
        padding-left: 32px;
        padding-right: 32px;
      }
    }

    /* ============================================
       FILTROS (filter buttons)
       ============================================ */
    .filtros {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .modo-visual {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    /* ============================================
       LISTA CONTAINER
       ============================================ */
    .lista {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 32px;
    }

    /* ============================================
       CARDS (detailed view)
       ============================================ */
    .card {
      background: white;
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      border-left: 4px solid var(--gray-300);
    }

    .card.ok { border-left-color: var(--success); }
    .card.alerta { border-left-color: var(--warning); }
    .card.erro { border-left-color: var(--danger); }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .titulo {
      font-weight: 700;
      color: var(--gray-800);
      font-size: 15px;
      letter-spacing: -0.2px;
    }

    .data {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 3px;
      font-weight: 500;
    }

    .valor {
      font-weight: 700;
      font-size: 15px;
      color: var(--navy-600);
      white-space: nowrap;
    }

    .linha {
      margin-top: 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      color: var(--gray-600);
    }

    .linha strong {
      color: var(--gray-800);
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .status.ok { color: var(--success); }
    .status.alerta { color: var(--warning); }
    .status.erro { color: var(--danger); }

    .alertas {
      margin-top: 8px;
      font-size: 12px;
      color: #92400e;
      font-weight: 500;
      line-height: 1.5;
      padding: 8px 10px;
      background: rgba(245,158,11,0.06);
      border-radius: 6px;
    }

    .acoes {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ============================================
       COMISSAO BOX (inside cards)
       ============================================ */
    .comissao-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      font-size: 13px;
    }

    .comissao-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .comissao-item {
      text-align: center;
    }

    .comissao-item span {
      display: block;
      font-size: 11px;
      color: var(--gray-400);
      font-weight: 500;
    }

    .comissao-item strong {
      font-size: 13px;
      color: var(--gray-800);
    }

    .comissao-status {
      margin-top: 8px;
      font-weight: 700;
      font-size: 12px;
    }

    .comissao-status.OK,
    .comissao-status.QUITADO { color: var(--success); }
    .comissao-status.PARCIAL,
    .comissao-status.PENDENTE,
    .comissao-status.AGUARDANDO { color: var(--warning); }
    .comissao-status.ERRO { color: var(--danger); }

    /* ============================================
       BUTTONS
       ============================================ */
    .btn {
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.1px;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--navy-600), var(--navy-700));
      color: white;
    }

    .btn.warning {
      background: var(--warning);
      color: white;
    }

    .btn.success {
      background: var(--success);
      color: white;
    }

    .btn.secondary {
      background: var(--gray-100);
      color: var(--gray-600);
      border: 1px solid var(--gray-200);
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    @media (max-width: 767px) {
      .filtros {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .filtros .btn {
        width: 100%;
        min-height: 44px;
        padding: 10px 10px;
        font-size: 12px;
        line-height: 1.2;
      }

      .filtros .btn[data-filtro="PENDENCIA_RECEBIMENTO"] {
        grid-column: 1 / -1;
      }

      .modo-visual {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .modo-visual .btn {
        width: 100%;
      }
    }

    /* ============================================
       LOADING
       ============================================ */
    .loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--gray-400);
      font-weight: 600;
      font-size: 14px;
    }

    /* ============================================
       ESPELHO TABLE (mirror view)
       ============================================ */
    .espelho-container {
      overflow-x: auto;
      width: 100%;
      max-width: 100vw;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .espelho-table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
    }

    .espelho-table th,
    .espelho-table td {
      white-space: nowrap;
    }

    .espelho-header,
    .espelho-row {
      display: grid;
      grid-template-columns: 100px 1.5fr 1.2fr 120px 120px 120px 140px 100px;
      padding: 11px 14px;
    }

    .espelho-header {
      background: var(--navy-600);
      color: white;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .espelho-row {
      border-top: 1px solid var(--gray-200);
      font-size: 13px;
      color: var(--gray-700);
      transition: background 0.15s;
    }

    .espelho-row:hover {
      background: var(--gray-50);
    }

    .espelho-row.ok { background: rgba(16,185,129,0.04); }
    .espelho-row.ok:hover { background: rgba(16,185,129,0.08); }
    .espelho-row.alerta { background: rgba(245,158,11,0.04); }
    .espelho-row.alerta:hover { background: rgba(245,158,11,0.08); }
    .espelho-row.erro { background: rgba(239,68,68,0.04); }
    .espelho-row.erro:hover { background: rgba(239,68,68,0.08); }
  </style>
</head>

<body>
  <!-- Global Header -->
  <div class="global-header">
    <a class="global-header-brand" onclick="window.location.href='index.html'" title="Voltar ao Início">
      <div class="global-header-back">

<header>
  <h1>📊 Painel Financeiro</h1>
  <p>Visão consolidada • Pendências • Alertas automáticos</p>
</header>

<div class="filtros">
  <button id="filtro-TODOS" data-filtro="TODOS" class="btn secondary" onclick="aplicarFiltro('TODOS')">Todos <span class="muted" id="filtro-count-TODOS"></span></button>
  <button id="filtro-CRITICOS" data-filtro="CRITICOS" class="btn warning" onclick="aplicarFiltro('CRITICOS')">🚨 Críticos <span class="muted" id="filtro-count-CRITICOS"></span></button>
  <button id="filtro-COM_DIVERGENCIA" data-filtro="COM_DIVERGENCIA" class="btn warning" onclick="aplicarFiltro('COM_DIVERGENCIA')">🧩 Divergências <span class="muted" id="filtro-count-COM_DIVERGENCIA"></span></button>
  <button id="filtro-AVISO_RECEBIDO_MAIOR" data-filtro="AVISO_RECEBIDO_MAIOR" class="btn secondary" onclick="aplicarFiltro('AVISO_RECEBIDO_MAIOR')">ℹ️ Recebido maior <span class="muted" id="filtro-count-AVISO_RECEBIDO_MAIOR"></span></button>
  <button id="filtro-SEM_RECEBIMENTO" data-filtro="SEM_RECEBIMENTO" class="btn warning" onclick="aplicarFiltro('SEM_RECEBIMENTO')">🔴 Sem recebimento <span class="muted" id="filtro-count-SEM_RECEBIMENTO"></span></button>
  <button id="filtro-RECEBIMENTO_PARCIAL" data-filtro="RECEBIMENTO_PARCIAL" class="btn warning" onclick="aplicarFiltro('RECEBIMENTO_PARCIAL')">🟠 Recebimento parcial <span class="muted" id="filtro-count-RECEBIMENTO_PARCIAL"></span></button>
  <button id="filtro-PENDENCIA_RECEBIMENTO" data-filtro="PENDENCIA_RECEBIMENTO" class="btn warning" onclick="aplicarFiltro('PENDENCIA_RECEBIMENTO')">💰 Pendência de recebimento <span class="muted" id="filtro-count-PENDENCIA_RECEBIMENTO"></span></button>
  <button id="filtro-QUITADO_BV_PENDENTE" data-filtro="QUITADO_BV_PENDENTE" class="btn warning" onclick="aplicarFiltro('QUITADO_BV_PENDENTE')">💥 Quitado + BV pendente <span class="muted" id="filtro-count-QUITADO_BV_PENDENTE"></span></button>
  <button id="filtro-COMISSAO_PENDENTE" data-filtro="COMISSAO_PENDENTE" class="btn warning" onclick="aplicarFiltro('COMISSAO_PENDENTE')">💼 Comissão pendente <span class="muted" id="filtro-count-COMISSAO_PENDENTE"></span></button>
  <button id="filtro-COMISSAO_PROBLEMA" data-filtro="COMISSAO_PROBLEMA" class="btn warning" onclick="aplicarFiltro('COMISSAO_PROBLEMA')">🚨 Problema de comissão <span class="muted" id="filtro-count-COMISSAO_PROBLEMA"></span></button>
  <button id="filtro-LEGADO" data-filtro="LEGADO" class="btn secondary" onclick="aplicarFiltro('LEGADO')">📦 Legado <span class="muted" id="filtro-count-LEGADO"></span></button>
  <button id="filtro-OK" data-filtro="OK" class="btn success" onclick="aplicarFiltro('OK')">✅ Sem pendências <span class="muted" id="filtro-count-OK"></span></button>
</div>
<div id="filtrosExtraBar" style="max-width:1100px;margin:0 auto 10px;padding:0 20px;display:flex;justify-content:flex-end;">
  <button id="btnMaisFiltros" class="btn secondary" style="display:none" onclick="alternarMaisFiltros()">Mais filtros</button>

<div class="modo-visual">

</div>

<div id="lista" class="lista">
  <div class="loading">Carregando saúde financeira dos eventos...</div>
</div>

<script>
  let EVENTOS_CACHE = [];
  let FILTRO_ATUAL = 'TODOS';
  let MODO_VISUAL = 'CARDS';
  let listaFiltradaAtual = null;
  let MOSTRAR_TODOS_FILTROS_MOBILE = false;

  const ALERTAS_LABEL = {
    EVENTO_OCORREU_SEM_RECEBIMENTO: 'Evento já ocorreu e não teve recebimento',
    EVENTO_OCORREU_RECEBIMENTO_PARCIAL: 'Evento ocorreu com recebimento parcial',
    INCONSISTENCIA_RECEBIDO_MAIOR_QUE_CONTRATO: 'Recebido maior que o valor do contrato',
    BV_PENDENTE: 'BV ainda não foi pago',
    FOLHA_NAO_REGISTRADA: 'Folha de custos não registrada',
    EVENTO_CANCELADO_COM_RECEBIMENTO: 'Evento cancelado com recebimento',
    COMISSAO_PENDENTE: 'Comissão do vendedor pendente ou parcial',
    COMISSAO_INCONSISTENTE: 'Inconsistência grave na comissão do vendedor',
    COMISSAO_NAO_PAGA_APOS_QUITACAO: 'Evento quitado, mas comissão ainda não foi paga',
    COMISSAO_PAGA_MAIOR_QUE_ESPERADO: 'Comissão paga maior que o valor esperado',
    COMISSAO_GERADA_MAIOR_QUE_ESPERADO: 'Comissão gerada maior que o valor esperado',
    EVENTO_QUITADO_COM_BV_PENDENTE: 'Evento quitado com BV pendente',
    EVENTO_QUITADO_COM_NF_PENDENTE: 'Evento quitado com NF pendente',
    DUPLICIDADE_BV_PROCESSADO: 'Duplicidade de BV processado',
    DUPLICIDADE_NF_PROCESSADO: 'Duplicidade de NF processada',
    DUPLICIDADE_FOLHA_PROCESSADA: 'Duplicidade de folha processada'
  };

  const DIVERGENCIAS_LABEL = {
    STATUS_BV_ESPELHO_DIVERGENTE: 'Status de BV divergente no espelho',
    STATUS_NF_ESPELHO_DIVERGENTE: 'Status de NF divergente no espelho',
    FOLHA_CUSTO_ESPELHO_DIVERGENTE: 'Valor da folha divergente no espelho'
  };

  function humanizarCodigoTecnico(codigo) {
    return String(codigo || '')
      .replace(/_/g, ' ')
      .toLowerCase()
      .replace(/(^|\s)\S/g, c => c.toUpperCase());
  }

  function labelAlerta(codigo) {
    return ALERTAS_LABEL[codigo] || humanizarCodigoTecnico(codigo);
  }

  function labelDivergencia(codigo) {
    return DIVERGENCIAS_LABEL[codigo] || humanizarCodigoTecnico(codigo);
  }

  function alertaEhInformativo(codigo) {
    return String(codigo || '').trim() === 'INCONSISTENCIA_RECEBIDO_MAIOR_QUE_CONTRATO';
  }

  function parseDataParaOrdem(valor) {
    if (!valor) return Number.MAX_SAFE_INTEGER;
    if (valor instanceof Date && !isNaN(valor.getTime())) return valor.getTime();
    const s = String(valor).trim();
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
      const [d, m, a] = s.split('/').map(Number);
      return new Date(a, m - 1, d).getTime();
    }
    const dt = new Date(s);
    return isNaN(dt.getTime()) ? Number.MAX_SAFE_INTEGER : dt.getTime();
  }

  function prioridadeEventoFinanceiro(evento) {
    const alertas = Array.isArray(evento?.alertas) ? evento.alertas : [];
    const divergencias = Array.isArray(evento?.divergencias) ? evento.divergencias : [];
    const alertasCriticos = alertas.filter(a => !alertaEhInformativo(a));
    if (divergencias.length > 0 || alertasCriticos.length > 0) return 0;
    if (alertas.length > 0) return 1;
    return 2;
  }

  function ordenarListaFinanceira(listaBase) {
    const lista = Array.isArray(listaBase) ? [...listaBase] : [];
    lista.sort((a, b) => {
      const pa = prioridadeEventoFinanceiro(a);
      const pb = prioridadeEventoFinanceiro(b);
      if (pa !== pb) return pa - pb;
      return parseDataParaOrdem(a?.dataEvento) - parseDataParaOrdem(b?.dataEvento);
    });
    return lista;
  }

  function isMobileViewport() {
    return window.matchMedia('(max-width: 767px)').matches;
  }

  function alternarMaisFiltros() {
    MOSTRAR_TODOS_FILTROS_MOBILE = !MOSTRAR_TODOS_FILTROS_MOBILE;
    atualizarContadoresFiltros();
  }

  function atualizarBotaoMaisFiltros() {
    const btn = document.getElementById('btnMaisFiltros');
    const bar = document.getElementById('filtrosExtraBar');
    if (!btn || !bar) return;

    const filtrosComZero = [
      'CRITICOS',
      'COM_DIVERGENCIA',
      'AVISO_RECEBIDO_MAIOR',
      'SEM_RECEBIMENTO',
      'RECEBIMENTO_PARCIAL',
      'PENDENCIA_RECEBIMENTO',
      'QUITADO_BV_PENDENTE',
      'COMISSAO_PENDENTE',
      'COMISSAO_PROBLEMA',
      'LEGADO',
      'OK'
    ].filter(tipo => filtrarListaPorTipo(EVENTOS_CACHE, tipo).length === 0);

    if (!isMobileViewport() || filtrosComZero.length === 0) {
      bar.style.display = 'none';
      btn.style.display = 'none';
      return;
    }

    bar.style.display = 'flex';
    btn.style.display = 'inline-flex';
    btn.textContent = MOSTRAR_TODOS_FILTROS_MOBILE ? 'Menos filtros' : 'Mais filtros';
  }

  function temSomenteAlertaInformativo(evento) {
    const alertas = Array.isArray(evento?.alertas) ? evento.alertas : [];
    const divergencias = Array.isArray(evento?.divergencias) ? evento.divergencias : [];
    if (divergencias.length > 0) return false;
    if (alertas.length === 0) return false;
    return alertas.every(alertaEhInformativo);
  }

  function escaparHtml(valor) {
    return String(valor || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function extrairTipoEvento(nomeEvento, tipoEvento) {
    const tipo = String(tipoEvento || '').trim();
    if (tipo) return tipo;
    const txt = String(nomeEvento || '');
    const pos = txt.indexOf(' - ');
    return pos > 0 ? txt.slice(0, pos) : txt || 'Evento';
  }

  function setModoVisual(modo) {
    MODO_VISUAL = (modo === 'ESPELHO') ? 'ESPELHO' : 'CARDS';
    atualizarBotoesModoVisual();
    renderAtual();
  }

  function atualizarBotoesModoVisual() {
    const btnDetalhado = document.getElementById('btnModoDetalhado');
    const btnEspelho = document.getElementById('btnModoEspelho');
    if (btnDetalhado) btnDetalhado.classList.toggle('primary', MODO_VISUAL === 'CARDS');
    if (btnDetalhado) btnDetalhado.classList.toggle('secondary', MODO_VISUAL !== 'CARDS');
    if (btnEspelho) btnEspelho.classList.toggle('primary', MODO_VISUAL === 'ESPELHO');
    if (btnEspelho) btnEspelho.classList.toggle('secondary', MODO_VISUAL !== 'ESPELHO');
  }

  async function carregarPainel() {
    try {
      const resp = await Auth.apiCall('listarEventosFinanceiros');

      if (!resp) {
        document.getElementById('lista').innerHTML =
          '<div class="loading">Erro ao carregar painel financeiro.</div>';
        return;
      }

      const eventos = Array.isArray(resp) ? resp : (resp.eventos || []);
      renderizarEventos(eventos);
    } catch (err) {
      console.error('Erro ao carregar painel financeiro:', err);
      document.getElementById('lista').innerHTML =
        '<div class="loading">Sessão expirada ou erro ao carregar dados.</div>';
    }
  }

  function renderizarEventos(eventos) {
    EVENTOS_CACHE = eventos;
    atualizarBotoesModoVisual();
    atualizarContadoresFiltros();
    aplicarFiltro(FILTRO_ATUAL, false);
    return;
  }

  function filtrarListaPorTipo(listaBase, tipo) {
    let lista = Array.isArray(listaBase) ? [...listaBase] : [];

    if (tipo === 'COMISSAO_PENDENTE') {
      lista = lista.filter(e =>
        e.comissao &&
        e.comissao.existe === true &&
        e.comissao.status === 'PENDENTE'
      );
    }

    if (tipo === 'COMISSAO_PROBLEMA') {
      lista = lista.filter(e =>
        e.comissao &&
        e.comissao.existe === true &&
        e.comissao.status === 'ERRO'
      );
    }

    if (tipo === 'SEM_RECEBIMENTO') {
      lista = lista.filter(e =>
        Array.isArray(e.alertas) && e.alertas.includes('EVENTO_OCORREU_SEM_RECEBIMENTO')
      );
    }

    if (tipo === 'RECEBIMENTO_PARCIAL') {
      lista = lista.filter(e =>
        Array.isArray(e.alertas) && e.alertas.includes('EVENTO_OCORREU_RECEBIMENTO_PARCIAL')
      );
    }

    if (tipo === 'PENDENCIA_RECEBIMENTO') {
      lista = lista.filter(e =>
        Array.isArray(e.alertas) && (
          e.alertas.includes('EVENTO_OCORREU_SEM_RECEBIMENTO') ||
          e.alertas.includes('EVENTO_OCORREU_RECEBIMENTO_PARCIAL')
        )
      );
    }

    if (tipo === 'CRITICOS') {
      lista = lista.filter(e =>
        (Array.isArray(e.alertas) && (
          e.alertas.includes('EVENTO_CANCELADO_COM_RECEBIMENTO') ||
          e.alertas.includes('EVENTO_QUITADO_COM_BV_PENDENTE') ||
          e.alertas.includes('EVENTO_QUITADO_COM_NF_PENDENTE') ||
          e.alertas.includes('DUPLICIDADE_BV_PROCESSADO') ||
          e.alertas.includes('DUPLICIDADE_NF_PROCESSADO') ||
          e.alertas.includes('DUPLICIDADE_FOLHA_PROCESSADA')
        )) ||
        (Array.isArray(e.divergencias) && e.divergencias.length > 0)
      );
    }

    if (tipo === 'AVISO_RECEBIDO_MAIOR') {
      lista = lista.filter(e =>
        Array.isArray(e.alertas) && e.alertas.includes('INCONSISTENCIA_RECEBIDO_MAIOR_QUE_CONTRATO')
      );
    }

    if (tipo === 'COM_DIVERGENCIA') {
      lista = lista.filter(e => Array.isArray(e.divergencias) && e.divergencias.length > 0);
    }

    if (tipo === 'QUITADO_BV_PENDENTE') {
      lista = lista.filter(e =>
        Array.isArray(e.alertas) && e.alertas.includes('EVENTO_QUITADO_COM_BV_PENDENTE')
      );
    }

    if (tipo === 'LEGADO') {
      lista = lista.filter(e => !!(e.metadados && e.metadados.legado));
    }

    if (tipo === 'OK') {
      lista = lista.filter(e =>
        e.status === 'ok' &&
        (!Array.isArray(e.divergencias) || e.divergencias.length === 0) &&
        (!e.comissao || e.comissao.status === 'OK' || e.comissao.status === 'QUITADO' || e.comissao.status === 'NA')
      );
    }

    if (tipo === 'TODOS') {
      return ordenarListaFinanceira(listaBase);
    }

    return ordenarListaFinanceira(lista);
  }

  function atualizarContadoresFiltros() {
    const filtros = [
      'TODOS',
      'CRITICOS',
      'COM_DIVERGENCIA',
      'AVISO_RECEBIDO_MAIOR',
      'SEM_RECEBIMENTO',
      'RECEBIMENTO_PARCIAL',
      'PENDENCIA_RECEBIMENTO',
      'QUITADO_BV_PENDENTE',
      'COMISSAO_PENDENTE',
      'COMISSAO_PROBLEMA',
      'LEGADO',
      'OK'
    ];

    filtros.forEach(tipo => {
      const count = filtrarListaPorTipo(EVENTOS_CACHE, tipo).length;
      const countEl = document.getElementById('filtro-count-' + tipo);
      const btnEl = document.getElementById('filtro-' + tipo);
      if (countEl) countEl.textContent = `(${count})`;
      if (btnEl && tipo !== 'TODOS') {
        const shouldDisable = count === 0 && FILTRO_ATUAL !== tipo;
        const shouldHide = isMobileViewport() && !MOSTRAR_TODOS_FILTROS_MOBILE && count === 0 && FILTRO_ATUAL !== tipo;
        btnEl.style.display = shouldHide ? 'none' : '';
        btnEl.disabled = shouldDisable;
        btnEl.style.opacity = shouldDisable ? '0.55' : '1';
        btnEl.style.cursor = shouldDisable ? 'not-allowed' : 'pointer';
      }
    });
    atualizarBotaoMaisFiltros();
  }

  function aplicarFiltro(tipo, recarregar = true) {
    FILTRO_ATUAL = tipo;
    const lista = filtrarListaPorTipo(EVENTOS_CACHE, tipo);

    listaFiltradaAtual = lista;
    atualizarContadoresFiltros();

    renderAtual();
  }

  function renderAtual(listaOverride) {
    const lista = listaOverride || listaFiltradaAtual || EVENTOS_CACHE;
    if (MODO_VISUAL === 'ESPELHO') {
      renderEspelho(lista);
    } else {
      renderCards(lista);
    }
  }

  function renderEspelho(lista) {
    const container = document.getElementById('lista');
    container.innerHTML = '';

    if (!lista.length) {
      container.innerHTML = '<div class="loading">Nenhum evento para este filtro.</div>';
      return;
    }

    const table = document.createElement('div');
    table.className = 'espelho-table';

    // Header
    const header = document.createElement('div');
    header.className = 'espelho-header';
    header.innerHTML = `
      <div>Data</div>
      <div>Evento</div>
      <div>Contratante</div>
      <div>Valor</div>
      <div>Recebido</div>
      <div>Pendente</div>
      <div>Comissão</div>
      <div>Status</div>
    `;
    table.appendChild(header);

    lista.forEach(evento => {
      let statusSeguro = evento.status;

      if (temSomenteAlertaInformativo(evento)) {
        statusSeguro = 'ok';
      }

      if (evento.comissao?.status === 'ERRO') {
        statusSeguro = 'erro';
      } else if (
        evento.comissao?.status === 'PENDENTE' &&
        statusSeguro !== 'erro'
      ) {
        statusSeguro = 'alerta';
      }

      if (!['ok', 'alerta', 'erro'].includes(statusSeguro)) {
        statusSeguro = 'ok';
      }

      const row = document.createElement('div');
      row.className = `espelho-row ${statusSeguro}`;

      let comissaoText = 'N/A';
      if (evento.comissao && evento.comissao.existe) {
        switch (evento.comissao.status) {
          case 'AGUARDANDO':
            comissaoText = 'Aguardando';
            break;
          case 'PARCIAL':
          case 'PENDENTE':
            comissaoText = '⚠️ Pendente';
            break;
          case 'OK':
          case 'QUITADO':
            comissaoText = 'Quitada';
            break;
          case 'ERRO':
            comissaoText = 'Erro';
            break;
          default:
            comissaoText = 'N/A';
        }
      }

      row.innerHTML = `
        <div>${formatarData(evento.dataEvento)}</div>
        <div>${escaparHtml(evento.nomeEvento)}</div>
        <div>${escaparHtml(evento.nomeContratante || '')}</div>
        <div>R$ ${formatarValor(evento.valorContrato)}</div>
        <div>R$ ${formatarValor(evento.totalRecebido)}</div>
        <div>R$ ${formatarValor(evento.valorPendente)}</div>
        <div>${comissaoText}</div>
        <div>${statusSeguro.toUpperCase()}</div>
      `;

      table.appendChild(row);
    });

    container.appendChild(table);
  }

  function renderCards(lista) {
    const container = document.getElementById('lista');
    container.innerHTML = '';

    if (!lista.length) {
      container.innerHTML = '<div class="loading">Nenhum evento para este filtro.</div>';
      return;
    }

    lista.forEach(ev => container.appendChild(criarCard(ev)));
  }

  function criarCard(evento) {
    let statusSeguro = evento.status;

    if (temSomenteAlertaInformativo(evento)) {
      statusSeguro = 'ok';
    }

    if (evento.comissao?.status === 'ERRO') {
      statusSeguro = 'erro';
    } else if (
      evento.comissao?.status === 'PENDENTE' &&
      statusSeguro !== 'erro'
    ) {
      statusSeguro = 'alerta';
    }

    if (!['ok', 'alerta', 'erro'].includes(statusSeguro)) {
      statusSeguro = 'ok';
    }

    const card = document.createElement('div');
    card.className = `card ${statusSeguro}`;

    // Criar arrays separados para alertas por categoria
    const alertasFinanceiros = [];
    const alertasComissao = [];
    const alertasCustos = [];
    const divergencias = [];

    (evento.alertas || []).forEach(a => {
      const texto = labelAlerta(a);
      if ([
        'EVENTO_OCORREU_SEM_RECEBIMENTO',
        'EVENTO_OCORREU_RECEBIMENTO_PARCIAL',
        'EVENTO_CANCELADO_COM_RECEBIMENTO'
      ].includes(a)) {
        alertasFinanceiros.push(texto);
      } else if (a === 'INCONSISTENCIA_RECEBIDO_MAIOR_QUE_CONTRATO') {
        alertasFinanceiros.push('ℹ️ ' + texto);
      } else if ([
        'COMISSAO_PENDENTE',
        'COMISSAO_INCONSISTENTE',
        'COMISSAO_NAO_PAGA_APOS_QUITACAO',
        'COMISSAO_PAGA_MAIOR_QUE_ESPERADO',
        'COMISSAO_GERADA_MAIOR_QUE_ESPERADO'
      ].includes(a)) {
        // Exibir alertas de comissão apenas se status não for AGUARDANDO ou PARCIAL
        if (evento.comissao?.status !== 'AGUARDANDO' && evento.comissao?.status !== 'PARCIAL') {
          alertasComissao.push(texto);
        }
      } else if ([
        'BV_PENDENTE',
        'FOLHA_NAO_REGISTRADA',
        'EVENTO_QUITADO_COM_BV_PENDENTE',
        'EVENTO_QUITADO_COM_NF_PENDENTE',
        'DUPLICIDADE_BV_PROCESSADO',
        'DUPLICIDADE_NF_PROCESSADO',
        'DUPLICIDADE_FOLHA_PROCESSADA'
      ].includes(a)) {
        alertasCustos.push(texto);
      }
    });

    (evento.divergencias || []).forEach(d => {
      divergencias.push(labelDivergencia(d));
    });

    const contratante = String(evento.nomeContratante || evento.nomeEvento || 'Evento');
    const tipoEvento = extrairTipoEvento(evento.nomeEvento, evento.tipoEvento);
    const idEvento = String(evento.idEvento || '');
    const contratanteSeguro = escaparHtml(contratante);
    const tipoEventoSeguro = escaparHtml(tipoEvento);
    const idEventoSeguro = escaparHtml(idEvento);

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="titulo">${formatarData(evento.dataEvento)} - ${contratanteSeguro}</div>
          <div class="data">${idEventoSeguro} • ${tipoEventoSeguro}</div>
        </div>
        <div class="valor">R$ ${formatarValor(evento.valorContrato)}</div>
      </div>

      <div class="linha">
        <span>Recebido</span>
        <strong>R$ ${formatarValor(evento.totalRecebido)}</strong>
      </div>

      <div class="linha">
        <span>Saldo a Receber</span>
        <strong>R$ ${formatarValor(evento.valorPendente)}</strong>
      </div>

      ${evento.comissao && evento.comissao.existe ? `
        <div class="comissao-box">
          <strong>💼 Comissão do Vendedor</strong>

          <div class="comissao-grid">
            <div class="comissao-item">
              <span>Esperado</span>
              <strong>R$ ${formatarValor(evento.comissao.valores.esperado)}</strong>
            </div>
            <div class="comissao-item">
              <span>Gerado</span>
              <strong>R$ ${formatarValor(evento.comissao.valores.gerado)}</strong>
            </div>
            <div class="comissao-item">
              <span>Pago</span>
              <strong>R$ ${formatarValor(evento.comissao.valores.pago)}</strong>
            </div>
            <div class="comissao-item">
              <span>Pendente</span>
              <strong>R$ ${formatarValor(evento.comissao.valores.pendente)}</strong>
            </div>
          </div>

          <div class="comissao-status ${evento.comissao.status}">
            ${(() => {
              switch (evento.comissao.status) {
                case 'NA': return 'Comissão: Não aplicável';
                case 'AGUARDANDO': return 'ℹ️ Comissão será gerada conforme os recebimentos';
                case 'PARCIAL': return 'ℹ️ Comissão parcialmente gerada';
                case 'PENDENTE': return '⚠️ Comissão pendente de pagamento';
                case 'OK':
                case 'QUITADO': return '✅ Comissão quitada';
                case 'ERRO': return '🚨 Problema grave na comissão';
                default: return 'Status de comissão desconhecido';
              }
            })()}
          </div>
        </div>
      ` : ''}

      <div class="linha">
        <span>BV</span>
        <strong>${escaparHtml(evento.bv?.status || 'N/A')}</strong>
      </div>

      <div class="linha">
        <span>Nota Fiscal</span>
        <strong>${escaparHtml(evento.nf?.status || 'N/A')}</strong>
      </div>

      <div class="status ${statusSeguro}">
        Status: ${statusSeguro.toUpperCase()}
      </div>

      ${alertasFinanceiros.length ? `<div class="alertas"><strong>💰 Financeiro:</strong> ${alertasFinanceiros.join(' • ')}</div>` : ''}
      ${alertasComissao.length ? `<div class="alertas"><strong>💼 Comissão:</strong> ${alertasComissao.join(' • ')}</div>` : ''}
      ${alertasCustos.length ? `<div class="alertas"><strong>🧾 Custos:</strong> ${alertasCustos.join(' • ')}</div>` : ''}
      ${divergencias.length ? `<div class="alertas"><strong>🧩 Divergências:</strong> ${divergencias.join(' • ')}</div>` : ''}
      ${evento?.metadados?.legado ? `<div class="alertas"><strong>📦 Origem:</strong> Legado</div>` : ''}

      <div class="acoes">
        <button class="btn secondary" onclick="irEditar('${idEvento}')">Editar</button>
        ${evento.acoes?.podeReceber ? `<button class="btn success" onclick="irReceber('${idEvento}')">Receber</button>` : ''}
        ${evento.acoes?.podePagarBV ? `<button class="btn warning" onclick="irPagarBV('${idEvento}')">Pagar BV</button>` : ''}
        ${evento.acoes?.podeRegistrarFolha ? `<button class="btn secondary" onclick="irCustos('${idEvento}')">Registrar Custos</button>` : ''}
        ${divergencias.length ? `<button class="btn warning" onclick="reconciliarEvento('${idEvento}')">Reconciliar</button>` : ''}
      </div>
    `;

    return card;
  }

  function formatarValor(v) {
    return Number(v || 0).toFixed(2).replace('.', ',');
  }

  function formatarData(d) {
    if (!d) return '';

    // Caso já seja Date
    if (d instanceof Date && !isNaN(d.getTime())) {
      return d.toLocaleDateString('pt-BR');
    }

    // Caso venha como string DD/MM/YYYY
    if (typeof d === 'string' && d.includes('/')) {
      const partes = d.split('/');
      if (partes.length === 3) {
        const dia = Number(partes[0]);
        const mes = Number(partes[1]) - 1;
        const ano = Number(partes[2]);
        const data = new Date(ano, mes, dia);
        if (!isNaN(data.getTime())) {
          return data.toLocaleDateString('pt-BR');
        }
      }
      return d; // fallback seguro
    }

    // Caso ISO ou timestamp
    const data = new Date(d);
    if (isNaN(data.getTime())) return '';

    return data.toLocaleDateString('pt-BR');
  }

  function irReceber(id) {
    window.location.href = 'central-financeira.html?mode=recebimento&idEvento=' + encodeURIComponent(id || '');
  }

  function irPagarBV(id) {
    window.location.href = 'central-financeira.html?mode=obrigacao&acao=bv&idEvento=' + encodeURIComponent(id || '');
  }

  function irCustos(id) {
    window.location.href = 'central-financeira.html?mode=obrigacao&acao=folha&idEvento=' + encodeURIComponent(id || '');
  }

  function irEditar(id) {
    window.location.href = 'editar-evento.html?id=' + encodeURIComponent(id || '');
  }

  async function reconciliarEvento(id) {
    if (!id) return;
    if (!confirm('Reconciliar espelho financeiro deste evento?')) return;
    try {
      const resp = await Auth.apiCall('reconciliarResumoFinanceiroEvento', { idEvento: id });
      if (!resp || resp.sucesso !== true) {
        alert(resp?.mensagem || 'Falha ao reconciliar evento');
        return;
      }
      alert('Evento reconciliado com sucesso.');
      await carregarPainel();
      aplicarFiltro(FILTRO_ATUAL, false);
    } catch (err) {
      console.error('Erro ao reconciliar evento:', err);
      alert('Erro ao reconciliar evento.');
    }
  }

  

window.addEventListener('load', () => {
  console.log('🚀 painel-financeiro.html iniciado (frontend externo)');
  carregarPainel();
  window.addEventListener('resize', () => atualizarContadoresFiltros());
});
</script>
