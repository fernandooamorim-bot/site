    resumo.innerHTML = html;
    atualizarResumoLiquidoComissao_();
  })
  .catch(err => {
    console.error('Erro ao gerar preview de comissão:', err);
    resumo.innerHTML = `
      <div><strong>Vendedor:</strong> ${vendedorSelecionado?.nome || '—'}</div>
      <div class="muted">Erro ao gerar resumo do fechamento</div>
    `;
  });
}

/* ================= VALIDACOES & UTIL ================= */

let lockSubmit = false;
const operationKeys = {
  recebimento: '',
  estorno: '',
  saida: '',
  fechamento: ''
};

function gerarOperationKey(tipo) {
  const rnd = Math.random().toString(36).slice(2, 10).toUpperCase();
  return [String(tipo || 'OP').toUpperCase(), Date.now(), rnd].join('-');
}

function obterOuCriarOperationKey(tipo) {
  const chave = String(tipo || '');
  if (!operationKeys[chave]) {
    operationKeys[chave] = gerarOperationKey(chave);
  }
  return operationKeys[chave];
}

function consumirOperationKey(tipo) {
  operationKeys[String(tipo || '')] = '';
}

async function uploadComprovanteParaCampo(fileInputId, targetInputId, categoria, referencia) {
  const input = document.getElementById(fileInputId);
  const target = document.getElementById(targetInputId);
  if (!input || !target) return alert('Campo de comprovante não encontrado.');

  const file = input.files && input.files[0];
  if (!file) return alert('Selecione um arquivo de comprovante.');

  const mimeType = (file.type || inferirMimePorNomeArquivo(file.name) || '').toLowerCase();
  const tiposPermitidos = ['image/png', 'image/jpeg', 'application/pdf'];
  if (!tiposPermitidos.includes(mimeType)) {
    return alert('Formato inválido. Use PNG, JPG ou PDF.');
  }

  const maxBytes = 2 * 1024 * 1024;
  if (file.size > maxBytes) {
    return alert('Arquivo maior que 2MB. Reduza o comprovante e tente novamente.');
  }

  const btn = event?.target;
  bloquearBotao(btn);
  showLoading('Enviando comprovante...');

  try {
    const dataUrl = await lerArquivoComoDataURL(file);
    const base64 = (dataUrl.split(',')[1] || '').trim();
    if (!base64) throw new Error('Falha ao ler arquivo selecionado');

    const resp = await Auth.apiCall('apiUploadComprovante', {
      arquivoBase64: base64,
      mimeType: mimeType,
      nomeArquivo: file.name,
      categoria: categoria || 'GERAL',
      referencia: referencia || ''
    });

    if (!resp || resp.sucesso !== true || !resp.linkArquivo) {
      throw new Error(resp?.mensagem || 'Falha no upload do comprovante');
    }

    target.value = resp.linkArquivo;
    input.value = '';
    alert('Comprovante carregado com sucesso.');
  } catch (err) {
    tratarErroApi(err);
  } finally {
    hideLoading();
    liberarBotao(btn);
  }
}

function lerArquivoComoDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result || '');
    reader.onerror = () => reject(new Error('Não foi possível ler o arquivo.'));
    reader.readAsDataURL(file);
  });
}

function inferirMimePorNomeArquivo(nome) {
  const n = String(nome || '').toLowerCase();
  if (n.endsWith('.png')) return 'image/png';
  if (n.endsWith('.jpg') || n.endsWith('.jpeg')) return 'image/jpeg';
  if (n.endsWith('.pdf')) return 'application/pdf';
  return '';
}

function tratarErroApi(err) {
  console.error('Erro API:', err);

  if (!err) {
    alert('Erro inesperado.');
    return;
  }

  if (err.mensagem) {
    alert(err.mensagem);
    return;
  }

  if (err.error) {
    alert(err.error);
    return;
  }

  if (typeof err === 'string') {
    alert(err);
    return;
  }

  alert('Erro ao processar a operação.');
}

function hojeLocalISO() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function formatarMoedaBrInput_(n) {
  return Number(n).toLocaleString('pt-BR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function sanitizarCampoMonetarioInput_(e) {
  e.target.value = String(e.target.value || '').replace(/[^\d,.\-]/g, '');
}

function formatarCampoMonetarioBlur_(e) {
  const parsed = parseValorSeguro(e.target.value, { allowZero: true });
  if (parsed === null) return;
  e.target.value = formatarMoedaBrInput_(parsed);
}

function aplicarMascaraMonetariaPorIds_(ids) {
  (ids || []).forEach((id) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.removeEventListener('input', sanitizarCampoMonetarioInput_);
    el.removeEventListener('blur', formatarCampoMonetarioBlur_);
    el.addEventListener('input', sanitizarCampoMonetarioInput_);
    el.addEventListener('blur', formatarCampoMonetarioBlur_);
  });
}

function parseValorSeguro(raw, opts = {}) {
  if (raw === null || raw === undefined) return null;
  const allowZero = opts.allowZero === true;
  const allowNegative = opts.allowNegative === true;

  if (typeof raw === 'number') {
    if (!Number.isFinite(raw)) return null;
    if (!allowNegative && raw < 0) return null;
    if (!allowZero && raw <= 0) return null;
    return Number(raw.toFixed(2));
  }

  if (typeof raw !== 'string') return null;
  let v = raw.trim();
  if (!v) return null;
  if (/[A-Za-z\u00C0-\u024F]/.test(v)) return null;

  v = v
    .replace(/\s/g, '')
    .replace(/R\$/gi, '')
    .replace(/%/g, '')
    .replace(/[^\d,.\-]/g, '');

  if (!v || v === '-' || v === ',' || v === '.') return null;

  const comma = v.includes(',');
  const dot = v.includes('.');

  if (comma && dot) {
    const lastComma = v.lastIndexOf(',');
    const lastDot = v.lastIndexOf('.');
    if (lastComma > lastDot) {
      v = v.replace(/\./g, '').replace(',', '.');
    } else {
      v = v.replace(/,/g, '');
    }
  } else if (comma) {
    const parts = v.split(',');
    const dec = parts[parts.length - 1] || '';
    if (parts.length > 2 || dec.length > 2) {
      v = parts.join('');
    } else {
      v = parts[0] + '.' + dec;
    }
  } else if (dot) {
    const parts = v.split('.');
    const dec = parts[parts.length - 1] || '';
    if (parts.length > 2 || dec.length > 2) {
      v = parts.join('');
    }
  }

  const n = Number(v);
  if (!Number.isFinite(n)) return null;
  if (!allowNegative && n < 0) return null;
  if (!allowZero && n <= 0) return null;
  return Number(n.toFixed(2));
}

function avaliarValorRecebimento(valorDigitado){
  const v = parseValorSeguro(valorDigitado, { allowZero: true });
  if (v === null || !ultimoResumoFinanceiro) return;

  let aviso = '';

  if (v > ultimoResumoFinanceiro.valorTotal) {
    aviso = '⚠️ O valor informado ultrapassa o valor TOTAL do evento.';
  } else if (v > ultimoResumoFinanceiro.valorPendente) {
    aviso = '⚠️ O valor informado ultrapassa o valor PENDENTE atual do evento.';
  }

  const avisoId = 'avisoValorRecebimento';
  let box = document.getElementById(avisoId);

  if (aviso) {
    if (!box) {
      box = document.createElement('div');
      box.id = avisoId;
      box.style.marginTop = '8px';
      box.style.fontSize = '13px';
      box.style.color = '#facc15';
      document.getElementById('valor').after(box);
    }
    box.innerText = aviso;
  } else if (box) {
    box.remove();
  }
}

function bloquearBotao(btn) {
  if (!btn) return;
  if (typeof btn.dataset.originalLabel === 'undefined' || btn.dataset.originalLabel === '') {
    btn.dataset.originalLabel = btn.innerHTML;
  }
  btn.disabled = true;
  btn.classList.add('is-loading');
}

function liberarBotao(btn) {
  if (!btn) return;
  btn.disabled = false;
  btn.classList.remove('is-loading');
  if (btn.dataset.originalLabel) {
    btn.innerHTML = btn.dataset.originalLabel;
  }
}

function resetRecebimentoForm() {
  consumirOperationKey('recebimento');
  eventoSelecionado = null;
  document.getElementById('valor').value = '';
  document.getElementById('obs').value = '';
  document.getElementById('comprovante').value = '';
  document.getElementById('evSug').innerHTML = '';
  resumo.innerHTML = '<span class="muted">Selecione um evento</span>';
}

function resetObrigacaoForm() {
  consumirOperationKey('saida');
  eventoSelecionado = null;

  const inp = document.getElementById('inputEvento');
  if (inp) inp.value = '';

  const tipo = document.getElementById('tipoSaida');
  if (tipo) tipo.value = '';

  const campos = document.getElementById('camposSaida');
  if (campos) campos.innerHTML = '';

  const sug = document.getElementById('evSug');
  if (sug) sug.innerHTML = '';

  resumo.innerHTML = '<span class="muted">Selecione um evento</span>';
}

function resetFechamentoForm() {
  consumirOperationKey('fechamento');
  document.getElementById('ajCredito').value = '0';
  document.getElementById('ajDebito').value = '0';
  document.getElementById('linkPagamento').value = '';
  document.getElementById('confirmarFechamento').checked = false;
  ajustesDetalhadosComissao = [];
  previewComissaoAtual = null;
  renderAjustesDetalhadosComissao_();
  recalcularTotaisAjustesDetalhadosComissao_();
  resumo.innerHTML = '<span class="muted">Selecione um vendedor</span>';
}

/* ================= SUBMITS ================= */

function submitRecebimento(){
  const btn = event?.target;
  if (lockSubmit) return;
  if(!eventoSelecionado) return alert('Selecione um evento');

  const valorRaw = document.getElementById('valor').value;
  const valor = parseValorSeguro(valorRaw);
  if (!valor) return alert('Informe um valor válido maior que zero.');

  lockSubmit = true;
  bloquearBotao(btn);
  showLoading('Registrando recebimento...');

  const payload = {
    tipoOperacao:'RECEBIMENTO',
    idEvento:eventoSelecionado,
    valor: valor,
    dataRecebimento:document.getElementById('data').value,
    formaPagamento:document.getElementById('forma').value,
    linkComprovante:document.getElementById('comprovante').value,
    observacoes:document.getElementById('obs').value,
    operationKey: obterOuCriarOperationKey('recebimento')
  };

  Auth.apiCall('apiRegistrarRecebimento', payload)
  .then(resp => {
    hideLoading();
    lockSubmit = false;
    liberarBotao(btn);

    if (!resp || resp.sucesso !== true) {
      alert(resp?.mensagem || 'Erro ao registrar recebimento');
      return;
    }

    consumirOperationKey('recebimento');
    resetRecebimentoForm();
    alert('Recebimento registrado');
  })
  .catch(err => {
    hideLoading();
    lockSubmit = false;
    liberarBotao(btn);
    tratarErroApi(err);
  });
}


/* ================= FECHAMENTO V2 ================= */

function executarFechamentoV2(){
  const btn = event?.target;
  if (lockSubmit) return;
  if(!vendedorSelecionado) return alert('Selecione um vendedor');

  if (!document.getElementById('confirmarFechamento')?.checked) {
    return alert('Você deve confirmar que revisou os valores antes de fechar.');
  }

  lockSubmit = true;
  bloquearBotao(btn);

  const payload = {
    idVendedor: vendedorSelecionado.id,
    ajusteCredito: parseValorSeguro(document.getElementById('ajCredito').value) || 0,
    ajusteDebito: parseValorSeguro(document.getElementById('ajDebito').value) || 0,
    linkComprovante: document.getElementById('linkPagamento').value,
    ajustesDetalhadosJson: JSON.stringify(
      (ajustesDetalhadosComissao || [])
        .map(a => ({
          tipo: String(a.tipo || '').toUpperCase() === 'DEBITO' ? 'DEBITO' : 'CREDITO',
          valor: Number(a.valor || 0),
          descricao: String(a.descricao || '').trim()
        }))
        .filter(a => a.valor > 0)
    ),
    operationKey: obterOuCriarOperationKey('fechamento')
  };

  if(!confirm(
    'Você está prestes a PAGAR TODAS as comissões pendentes deste vendedor.\\n' +
    'Esta ação não pode ser desfeita.'
  )) {
    lockSubmit = false;
    liberarBotao(btn);
    return;
  }

  showLoading('Gerando fechamento e PDF...');

  Auth.apiCall('fecharComissaoVendedor', {
    idVendedor: payload.idVendedor,
    ajusteCredito: payload.ajusteCredito,
    ajusteDebito: payload.ajusteDebito,
    linkComprovante: payload.linkComprovante,
    ajustesDetalhadosJson: payload.ajustesDetalhadosJson,
    operationKey: payload.operationKey
  })
  .then(resp => {
    hideLoading();
    lockSubmit = false;
    liberarBotao(btn);

    if (!resp || resp.sucesso !== true) {
      alert(resp?.mensagem || 'Erro ao fechar comissão');
      return;
    }

    consumirOperationKey('fechamento');
    resetFechamentoForm();
    if (resp.pdfGerado === false && resp.idFechamento) {
      alert((resp.mensagem || 'Fechamento confirmado, PDF pendente') + '\\nTentando regenerar PDF...');
      showLoading('Regenerando PDF do fechamento...');
      Auth.apiCall('regerarPdfFechamentoComissao', { idFechamento: resp.idFechamento })
        .then(pdfResp => {
          hideLoading();
          if (pdfResp && pdfResp.sucesso === true) {
            alert('Fechamento confirmado e PDF regenerado com sucesso.');
            if (pdfResp.linkPdf) window.open(pdfResp.linkPdf, '_blank');
          } else {
            alert('Fechamento confirmado, mas a regeneração do PDF falhou. Tente novamente pela ação de reprocesso.');
          }
        })
        .catch(errPdf => {
          hideLoading();
          console.error('Erro ao regenerar PDF:', errPdf);
          alert('Fechamento confirmado, mas não foi possível regenerar o PDF agora.');
        });
      return;
    }

    alert(resp.mensagem || 'Fechamento realizado com sucesso');
    if (resp.linkPdf) window.open(resp.linkPdf, '_blank');
  })
  .catch(err => {
    hideLoading();
    lockSubmit = false;
    liberarBotao(btn);
    tratarErroApi(err);
  });
}
