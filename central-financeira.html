<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1a2e"/>
  <meta name="application-name" content="Sistema Super Agenda"/>
  <meta name="apple-mobile-web-app-title" content="Super Agenda"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="msapplication-TileColor" content="#0f1a2e"/>
  <link rel="manifest" href="site.webmanifest"/>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48.png"/>
  <link rel="icon" type="image/png" sizes="96x96" href="img/favicon-96x96.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png"/>
  <title>Central Financeira • FA Produções</title>

  <!-- Google Identity -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Auth padrão do sistema -->
  <script src="auth.js"></script>
  <script src="status-formatters.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    /* ============================================
       GLOBAL NAV — FA PRODUÇÕES Design System
       ============================================ */
    :root {
      --nav-navy-900: #0a1628;
      --nav-navy-800: #0f1a2e;
      --nav-navy-700: #142240;
      --nav-navy-600: #1e3a5f;
      --nav-gold-500: #d4a853;
      --nav-gold-400: #e0bc6a;
      --nav-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --nav-height: 68px;
      --nav-radius-md: 12px;
      --nav-radius-sm: 8px;
      --nav-radius-full: 999px;
    }

    .global-header {
      background: var(--nav-navy-800);
      color: white;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 200;
      font-family: var(--nav-font);
    }

    .global-header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .global-header-brand:hover { opacity: 0.85; }

    .global-header-back {
      width: 32px;
      height: 32px;
      border-radius: var(--nav-radius-sm);
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .global-header-brand:hover .global-header-back {
      background: rgba(212,168,83,0.15);
    }

    .global-header-back i { color: var(--nav-gold-400); width: 18px; height: 18px; }

    .global-header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .global-header-title i { width: 20px; height: 20px; color: var(--nav-gold-400); }

    .global-header-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px 4px 4px;
      background: rgba(255,255,255,0.06);
      border-radius: var(--nav-radius-full);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: var(--nav-font);
    }

    .global-header-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--nav-navy-600), rgba(58,96,152,0.8));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--nav-gold-400);
      text-transform: uppercase;
    }

    .global-header-name {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      font-weight: 600;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .global-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .global-header-logout {
      width: 32px;
      height: 32px;
      border-radius: var(--nav-radius-sm);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .global-header-logout i,
    .global-header-logout svg {
      width: 17px;
      height: 17px;
      color: rgba(255,255,255,0.8);
    }

    .global-header-logout:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.35);
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(var(--nav-height) + env(safe-area-inset-bottom) + 10px);
      background: var(--nav-navy-800);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: flex-start;
      justify-content: space-evenly;
      z-index: 200;
      padding: 0 8px calc(env(safe-area-inset-bottom) + 16px);
      border-radius: 0;
      font-family: var(--nav-font);
    }

    .bnav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 2px 10px 8px;
      min-height: 52px;
      min-width: 62px;
      border-radius: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      border: none;
      background: none;
      transition: all 0.2s;
    }

    .bnav-item i, .bnav-item svg { width: 22px; height: 22px; color: rgba(255,255,255,0.9); stroke: currentColor; fill: none; transition: color 0.2s; }
    .bnav-item span { font-family: var(--nav-font); font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.9); transition: color 0.2s; line-height: 1; }
    .bnav-item.active i, .bnav-item:hover i { color: var(--nav-gold-400); }
    .bnav-item.active span, .bnav-item:hover span { color: var(--nav-gold-400); }
    .bnav-item.active { background: rgba(212,168,83,0.08); }

    @media (min-width: 768px) {
      .bottom-nav { display: none; }
      body { padding-bottom: 0 !important; }
    }

    @media (max-width: 767px) {
      body { padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 12px) !important; }
    }
  </style>

  <style>
    /* ============================================
       DESIGN SYSTEM — FA PRODUÇÕES (central-financeira)
       ============================================ */
    :root {
      --navy-900: #0a1628;
      --navy-800: #0f1a2e;
      --navy-700: #142240;
      --navy-600: #1e3a5f;
      --navy-500: #264a7a;
      --navy-400: #3a6098;
      --gold-600: #b8903e;
      --gold-500: #d4a853;
      --gold-400: #e0bc6a;
      --gold-300: #ebd08c;
      --gray-50: #f8f9fc;
      --gray-100: #f1f3f8;
      --gray-200: #e2e6ef;
      --gray-300: #cdd3e0;
      --gray-400: #9ca3b8;
      --gray-500: #6b7490;
      --gray-600: #4a5268;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --success-color: #10b981;
      --warning-color: #f59e0b;
      --danger-color: #ef4444;
      --info-color: #3b82f6;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(10,22,40,0.06);
      --shadow-md: 0 4px 16px rgba(10,22,40,0.08);
      --shadow-lg: 0 8px 32px rgba(10,22,40,0.14);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--gray-50);
      color: var(--gray-800);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================
       CONTAINER
       ============================================ */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 32px;
    }

    @media (min-width: 768px) {
      .container { padding: 32px; }
    }

    .container > h1 {
      display: none;
    }

    /* ============================================
       LOADING OVERLAY
       ============================================ */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,22,40,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 10px;
      color: rgba(255,255,255,0.7);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
    }

    .loading-overlay.active { display: flex; }

    .loading-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid var(--gold-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingText {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      letter-spacing: -0.2px;
    }

    #loadingSubtext {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.72);
      min-height: 16px;
    }

    /* ============================================
       INTENT BUTTONS (operation selector)
       ============================================ */
    .intent {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: nowrap;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      padding: 6px;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
    }

    .intent button {
      flex: 1;
      min-width: 150px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--gray-600);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .intent button + button::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 10px;
      bottom: 10px;
      width: 1px;
      background: var(--gray-200);
      pointer-events: none;
    }

    .intent button.active::before {
      opacity: 0;
    }

    .intent button:hover {
      border-color: var(--gray-200);
      color: var(--navy-600);
      background: rgba(30,58,95,0.05);
    }

    .intent button.active {
      border-color: rgba(30,58,95,0.45);
      background: linear-gradient(135deg, var(--navy-600), var(--navy-700));
      color: white;
      box-shadow: 0 2px 8px rgba(30,58,95,0.2);
    }

    .intent button[disabled] {
      opacity: 0.6;
      cursor: not-allowed !important;
      transform: none !important;
      box-shadow: none !important;
    }

    .intent button .mode-icon {
      width: 16px;
      height: 16px;
    }

    .intent button .mode-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      padding: 0 6px;
      background: rgba(30,58,95,0.1);
      color: var(--navy-600);
    }

    .intent button.active .mode-badge {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    .intent-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -8px 0 14px;
      padding: 0 4px;
      color: var(--gray-500);
      font-size: 12px;
      font-weight: 600;
    }

    .intent-meta strong {
      color: var(--navy-700);
    }

    /* ============================================
       MAIN LAYOUT (form + side)
       ============================================ */
    .main {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .box {
      background: white;
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      flex: 1;
      min-width: 280px;
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .box:hover {
      border-color: var(--gray-300);
      box-shadow: var(--shadow-md);
    }

    .box h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy-600);
      margin-bottom: 4px;
      letter-spacing: -0.2px;
    }

    .box h4 {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 4px;
    }

    .side {
      width: 360px;
      max-width: 100%;
    }

    /* ============================================
       FORM ELEMENTS
       ============================================ */
    label {
      display: block;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      letter-spacing: -0.1px;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      margin-top: 6px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--gray-200);
      background: white;
      color: var(--gray-800);
      font-size: 14px;
      font-family: var(--font);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--navy-500);
      box-shadow: 0 0 0 3px rgba(30,58,95,0.08);
    }

    input::placeholder, textarea::placeholder {
      color: var(--gray-400);
    }

    input[readonly] {
      background: var(--gray-50);
      color: var(--gray-500);
    }

    textarea { resize: vertical; }

    /* ============================================
       ACTION BUTTONS
       ============================================ */
    .btn {
      margin-top: 16px;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      transition: all 0.2s;
      width: 100%;
      letter-spacing: -0.1px;
      position: relative;
    }

    .primary {
      background: linear-gradient(135deg, var(--navy-600), var(--navy-700));
      color: white;
      box-shadow: 0 2px 8px rgba(30,58,95,0.2);
    }

    .primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(30,58,95,0.25);
    }

    .secondary {
      background: var(--navy-500);
      color: white;
      box-shadow: 0 2px 6px rgba(30,58,95,0.15);
    }

    .secondary:hover {
      background: var(--navy-400);
    }

    .danger {
      background: var(--danger-color);
      color: white;
      box-shadow: 0 2px 6px rgba(239,68,68,0.2);
    }

    .danger:hover {
      background: #dc2626;
    }

    .btn[disabled] {
      opacity: 0.6;
      cursor: not-allowed !important;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn.is-loading {
      pointer-events: none;
    }

    .btn.is-loading::after {
      content: '';
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: rgba(255,255,255,0.95);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ============================================
       AUTOCOMPLETE
       ============================================ */
    .autocomplete {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      margin-top: 0;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(10,22,40,0.1);
    }

    .autocomplete div {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      color: var(--gray-700);
      border-bottom: 1px solid var(--gray-100);
      transition: background 0.15s;
    }

    .autocomplete div:hover {
      background: var(--gray-50);
    }

    .autocomplete div:last-child {
      border-bottom: none;
    }

    .ac-line-1 {
      font-weight: 600;
      color: var(--gray-800);
      line-height: 1.3;
    }

    .ac-line-2 {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 2px;
      line-height: 1.2;
    }

    /* ============================================
       DIVIDER & MUTED
       ============================================ */
    .divider {
      margin: 16px 0;
      border: none;
      border-top: 1px solid var(--gray-200);
    }

    .muted {
      color: var(--gray-500);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
    }

    .muted strong {
      color: var(--gray-700);
    }

    .fiscal-toolbar {
      display: grid;
      grid-template-columns: minmax(300px, 1.5fr) minmax(190px, 1fr) minmax(230px, auto);
      gap: 10px;
      margin-bottom: 12px;
      align-items: end;
    }
    .fiscal-toolbar > * {
      min-width: 0;
    }
    .fiscal-toolbar input,
    .fiscal-toolbar select {
      margin-top: 0;
    }
    .fiscal-toolbar-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .fiscal-toolbar-actions .btn {
      margin-top: 0;
      width: 100%;
      min-width: 0;
      padding: 11px 10px;
    }
    .fiscal-lista {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      max-height: none;
      overflow: visible;
      padding-right: 0;
    }
    .fiscal-card {
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    .fiscal-card.alerta {
      border-color: #f59e0b;
      background: #fffbeb;
    }
    .fiscal-card.erro {
      border-color: #ef4444;
      background: #fef2f2;
    }
    .fiscal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .fiscal-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      color: var(--gray-600);
    }
    .fiscal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .fiscal-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
      color: var(--gray-700);
    }
    .fiscal-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .fiscal-actions .btn {
      margin-top: 0;
      padding: 8px 10px;
      font-size: 12px;
    }
    @media (max-width: 900px) {
      .intent {
        flex-wrap: nowrap;
        gap: 6px;
        padding: 5px;
        scroll-snap-type: x proximity;
      }
      .intent button {
        min-width: 138px;
        flex: 0 0 auto;
        scroll-snap-align: start;
      }
      .intent button + button::before {
        left: -3px;
      }
      .fiscal-toolbar {
        grid-template-columns: 1fr;
      }
      .fiscal-toolbar-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .fiscal-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .box {
        min-width: 100%;
      }
      .main {
        gap: 12px;
      }
      body[data-mode="fiscalizacao"] .fiscal-lista {
        max-height: none;
        overflow: visible;
        padding-right: 0;
      }
      body[data-mode="fiscalizacao"] .side {
        position: static;
        top: auto;
        max-height: none;
        overflow: visible;
      }
    }

    @media (max-width: 560px) {
      .fiscal-toolbar-actions {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 901px) {
      body[data-mode="fiscalizacao"] .fiscal-lista {
        max-height: none;
        overflow: visible;
        padding-right: 0;
      }

      body[data-mode="fiscalizacao"] .side {
        position: sticky;
        top: 76px;
        max-height: none;
        overflow: visible;
      }
    }
  </style>
</head>
<body>
  <!-- Global Header -->
  <div class="global-header">
    <a class="global-header-brand" onclick="window.location.href='index.html'" title="Voltar ao Início">

<div class="container">

<h1>💰 Central Financeira</h1>

<div class="intent">
  <button data-mode="recebimento">

  </div>
</div>

<script>
console.log('🚀 central-financeira.html iniciado (frontend externo)');

window.addEventListener('load', async () => {
  try {
    showLoading('Abrindo Central Financeira...', 'Inicializando sessão');
    if (!window.Auth) throw new Error('AUTH_NOT_LOADED');

    updateLoadingSubtext_('Validando autenticação');
    const auth = await Auth.apiCall('verificarUsuario');
    if (!auth || !auth.ok) throw new Error('NOT_AUTH');
    perfilAtual = String(auth.user?.perfil || '');
    perfilAtualNorm = normalizarPerfil_(perfilAtual);
    console.log('🔐 Perfil (raw):', JSON.stringify(perfilAtual), '| norm:', perfilAtualNorm);
    if (!ehProprietario_() && !ehSocio_()) {
      alert('Você não tem permissão para acessar a Central Financeira.');
      window.location.href = 'index.html';
      return;
    }

    console.log('🔐 Usuário autenticado:', auth.user?.email);
    aplicarPermissoesTelaFinanceira();

    showLoading('Carregando Central Financeira...', 'Preparando dados iniciais');
    await iniciarCentralFinanceira();
    appReady = true;
    setIntentButtonsEnabled_(true);
    updateLoadingSubtext_('Aplicando rota de entrada');
    const consumiuRota = await aplicarRotaInicialFinanceira_();
    if (!consumiuRota) {
      const modoPadrao = ehSocio_() ? 'obrigacao' : 'recebimento';
      ativarModoCentral_(modoPadrao);
    } else if (mode) {
      render();
    }
    hideLoading();

  } catch (err) {
    hideLoading();
    console.error('Erro de autenticação:', err);
    alert('Sessão expirada. Volte ao menu.');
    window.location.href = 'index.html';
  }
});

function showLoading(txt, subtxt){
  document.getElementById('loadingText').innerText = txt || 'Processando...';
  updateLoadingSubtext_(subtxt || '');
  document.getElementById('loading').classList.add('active');
}
function hideLoading(){
  document.getElementById('loading').classList.remove('active');
}
function updateLoadingSubtext_(subtxt){
  const el = document.getElementById('loadingSubtext');
  if (!el) return;
  el.innerText = subtxt || '';
}

let mode = null;
let eventoSelecionado = null;
let vendedorSelecionado = null;
let vendedoresCache = [];
let comissoesPendentes = [];
let perfilAtual = '';
let perfilAtualNorm = '';
let appReady = false;

let ultimoPreview = null;
let ultimoResumoFinanceiro = null;
let ajustesDetalhadosComissao = [];
let previewComissaoAtual = null;
let fiscalEventosCache = [];
let fiscalDivergenciasAuditoriaMap = new Map();
let buscaEventoTimer = null;
let buscaEventoSeq = 0;
const buscaEventoCache = new Map();
const BUSCA_EVENTO_DEBOUNCE_MS = 260;
const BUSCA_EVENTO_CACHE_TTL_MS = 60000;

const ALERTAS_LABEL = {
  EVENTO_OCORREU_SEM_RECEBIMENTO: 'Evento já ocorreu e não teve recebimento',
  EVENTO_OCORREU_RECEBIMENTO_PARCIAL: 'Evento ocorreu com recebimento parcial',
  INCONSISTENCIA_RECEBIDO_MAIOR_QUE_CONTRATO: 'Recebido maior que o valor do contrato',
  BV_PENDENTE: 'BV ainda não foi pago',
  FOLHA_NAO_REGISTRADA: 'Folha de custos não registrada',
  EVENTO_CANCELADO_COM_RECEBIMENTO: 'Evento cancelado com recebimento',
  COMISSAO_PENDENTE: 'Comissão do vendedor pendente ou parcial',
  COMISSAO_INCONSISTENTE: 'Inconsistência grave na comissão do vendedor',
  COMISSAO_NAO_PAGA_APOS_QUITACAO: 'Evento quitado, mas comissão ainda não foi paga',
  COMISSAO_PAGA_MAIOR_QUE_ESPERADO: 'Comissão paga maior que o valor esperado',
  COMISSAO_GERADA_MAIOR_QUE_ESPERADO: 'Comissão gerada maior que o valor esperado',
  EVENTO_QUITADO_COM_BV_PENDENTE: 'Evento quitado com BV pendente',
  EVENTO_QUITADO_COM_NF_PENDENTE: 'Evento quitado com NF pendente',
  DUPLICIDADE_BV_PROCESSADO: 'Duplicidade de BV processado',
  DUPLICIDADE_NF_PROCESSADO: 'Duplicidade de NF processada',
  DUPLICIDADE_FOLHA_PROCESSADA: 'Duplicidade de folha processada'
};

const DIVERGENCIAS_LABEL = {
  STATUS_BV_ESPELHO_DIVERGENTE: 'Status de BV divergente no espelho',
  STATUS_NF_ESPELHO_DIVERGENTE: 'Status de NF divergente no espelho',
  FOLHA_CUSTO_ESPELHO_DIVERGENTE: 'Valor da folha divergente no espelho'
};

const buttons = document.querySelectorAll('.intent button');
const form = document.getElementById('form');
const resumo = document.getElementById('resumo');
const MODE_LABELS = {
  recebimento: 'Recebimento',
  estorno: 'Estorno',
  comissao: 'Comissão',
  obrigacao: 'Saídas',
  fiscalizacao: 'Fiscalização'
};

function setIntentButtonsEnabled_(enabled) {
  buttons.forEach(btn => {
    btn.disabled = !enabled;
    btn.style.opacity = enabled ? '1' : '0.55';
    btn.style.cursor = enabled ? 'pointer' : 'not-allowed';
  });
}

setIntentButtonsEnabled_(false);

function atualizarIndicadorModoAtivo_() {
  const el = document.getElementById('modoAtivoLabel');
  const aux = document.getElementById('modoMetaAux');
  document.body.setAttribute('data-mode', mode || '');
  if (!el) return;
  el.textContent = MODE_LABELS[mode] || '—';
  if (aux && mode !== 'fiscalizacao') aux.textContent = '';
}

function atualizarBadgeFiscalizacao_(lista) {
  const badge = document.getElementById('badgeFiscalizacao');
  const aux = document.getElementById('modoMetaAux');
  if (!badge) return;

  const eventos = Array.isArray(lista) ? lista : [];
  const criticos = eventos.filter(ev => {
    const alertas = (Array.isArray(ev.alertas) ? ev.alertas : []).filter(a => !alertaEhInformativo_(a));
    const divergencias = Array.isArray(ev.divergencias) ? ev.divergencias : [];
    return divergencias.length > 0 || alertas.length > 0;
  }).length;

  if (criticos > 0) {
    badge.textContent = String(criticos);
    badge.style.display = 'inline-flex';
  } else {
    badge.textContent = '';
    badge.style.display = 'none';
  }

  if (aux) {
    aux.textContent = criticos > 0 ? `${criticos} evento(s) com alerta/divergência` : '';
  }
}

function alertaEhInformativo_(codigo) {
  return String(codigo || '').trim() === 'INCONSISTENCIA_RECEBIDO_MAIOR_QUE_CONTRATO';
}

function humanizarCodigoTecnico_(codigo) {
  return String(codigo || '')
    .replace(/_/g, ' ')
    .toLowerCase()
    .replace(/(^|\s)\S/g, c => c.toUpperCase());
}

function labelAlerta_(codigo) {
  return ALERTAS_LABEL[codigo] || humanizarCodigoTecnico_(codigo);
}

function labelDivergencia_(codigo) {
  return DIVERGENCIAS_LABEL[codigo] || humanizarCodigoTecnico_(codigo);
}

function aplicarPermissoesTelaFinanceira() {
  if (!ehSocio_()) return;

  const btnRecebimento = document.querySelector('.intent button[data-mode=\"recebimento\"]');
  const btnEstorno = document.querySelector('.intent button[data-mode=\"estorno\"]');
  const btnComissao = document.querySelector('.intent button[data-mode=\"comissao\"]');

  if (btnRecebimento) btnRecebimento.style.display = 'none';
  if (btnEstorno) btnEstorno.style.display = 'none';
  if (btnComissao) btnComissao.style.display = 'none';
}

function normalizarPerfil_(perfil) {
  return String(perfil || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();
}

function ehProprietario_() {
  return perfilAtualNorm === 'proprietario';
}

function ehSocio_() {
  return perfilAtualNorm === 'socio' || perfilAtualNorm === 'administrador' || perfilAtualNorm === 'admin';
}

/* ================= INIT ================= */

// google.script.run.withSuccessHandler(list=>{
//  vendedoresCache = list || [];
// }).listarVendedores();

/* ================= MODE ================= */

buttons.forEach(b=>{
  b.onclick = ()=>{
    if (!appReady) {
      alert('Aguarde o carregamento completo da Central Financeira.');
      return;
    }
    if(mode && mode !== b.dataset.mode &&
       !confirm('Trocar operação limpa os dados atuais. Continuar?')) return;

    ativarModoCentral_(b.dataset.mode);
  };
});

function ativarModoCentral_(novoModo) {
  mode = novoModo;
  buttons.forEach(x=>x.classList.remove('active'));
  const btn = document.querySelector(`.intent button[data-mode="${novoModo}"]`);
  if (btn) btn.classList.add('active');
  atualizarIndicadorModoAtivo_();

  eventoSelecionado = null;
  vendedorSelecionado = null;
  comissoesPendentes = [];

  render();
}

async function iniciarCentralFinanceira() {
  try {
    // Pré-carrega vendedores
    vendedoresCache = await Auth.apiCall('listarVendedores') || [];
    console.log('✅ Vendedores carregados:', vendedoresCache.length);
    // Pré-carrega badge da fiscalização sem mudar o modo atual
    try {
      const listaFin = await Auth.apiCall('listarEventosFinanceiros');
      const eventosFin = Array.isArray(listaFin) ? listaFin : (Array.isArray(listaFin?.eventos) ? listaFin.eventos : []);
      atualizarBadgeFiscalizacao_(eventosFin);
    } catch (e) {
      console.warn('⚠️ Não foi possível pré-carregar badge da fiscalização:', e);
      atualizarBadgeFiscalizacao_([]);
    }
  } catch (err) {
    console.error('Erro ao iniciar Central Financeira:', err);
    alert('Erro ao carregar dados iniciais');
  }
}

async function aplicarRotaInicialFinanceira_() {
  try {
    const qs = new URLSearchParams(window.location.search || '');
    const modoRaw = String(qs.get('mode') || '').trim().toLowerCase();
    const acaoRaw = String(qs.get('acao') || '').trim().toLowerCase();
    const idEvento = String(qs.get('idEvento') || '').trim();

    const modo = ['recebimento', 'estorno', 'comissao', 'obrigacao', 'fiscalizacao'].includes(modoRaw)
      ? modoRaw
      : (acaoRaw === 'bv' || acaoRaw === 'folha' ? 'obrigacao' : '');

    if (!modo && !idEvento) return false;

    let modoFinal = modo;
    if (ehSocio_() && ['recebimento', 'estorno', 'comissao'].includes(modoFinal)) {
      modoFinal = 'obrigacao';
    }

    if (modoFinal) {
      ativarModoCentral_(modoFinal);
    } else if (!mode) {
      ativarModoCentral_('obrigacao');
    }

    if (!idEvento) return true;

    const selecionado = await selecionarEventoPorIdNoModo_(idEvento);
    if (!selecionado) {
      resumo.innerHTML = `<span class="muted">Evento ${idEvento} não encontrado para ação rápida.</span>`;
      return true;
    }

    if (mode === 'obrigacao') {
      const tipo = document.getElementById('tipoSaida');
      if (tipo) {
        if (acaoRaw === 'bv') tipo.value = 'BV_EVENTO';
        if (acaoRaw === 'folha') tipo.value = 'FOLHA_EVENTO';
        if (tipo.value) renderCamposSaida();
      }
    }

    return true;
  } catch (err) {
    console.error('Falha na rota inicial financeira:', err);
    return false;
  }
}

async function selecionarEventoPorIdNoModo_(idEvento) {
  const id = String(idEvento || '').trim();
  if (!id) return false;

  try {
    const lista = await Auth.apiCall('listarEventosFinanceiros');
    const eventos = Array.isArray(lista) ? lista : (Array.isArray(lista?.eventos) ? lista.eventos : []);
    atualizarBadgeFiscalizacao_(eventos);
    const alvo = eventos.find(e => String(e.idEvento || '') === id);
    if (!alvo) return false;

    await selectEvento({
      id: id,
      contratante: String(alvo.nomeContratante || '').trim() || String(alvo.nomeEvento || ''),
      tipoEvento: String(alvo.nomeEvento || 'Evento')
    });
    return true;
  } catch (err) {
    console.error('Falha ao selecionar evento por ID no modo:', err);
    return false;
  }
}

/* ================= RENDER ================= */

function render(){
  if(mode === 'recebimento') renderRecebimento();
  if(mode === 'estorno') renderEstorno();
  if(mode === 'comissao') renderComissao();
  if(mode === 'obrigacao') renderObrigacao();
  if(mode === 'fiscalizacao') renderFiscalizacao();
}
function renderEstorno(){
  resumo.innerHTML = '<span class="muted">Selecione um evento para estornar um recebimento</span>';

  form.innerHTML = `
    <h3>🔴 Estorno de Recebimento</h3>

    <label>Evento (Contratante)</label>
    <input id="inputEvento" onkeyup="buscarEvento(this.value)">
    <div id="evSug" class="autocomplete"></div>

    <div class="divider"></div>

    <div id="listaRecebimentos" class="muted">
      Selecione um evento para listar os recebimentos
    </div>

    <div class="divider"></div>

    <div id="formEstorno" style="display:none">
      <label>ID do Recebimento</label>
      <input id="idRecebimento" readonly>

      <label>Valor original recebido</label>
      <input id="valorOriginal" readonly>

      <label>Valor do estorno</label>
      <input type="text" id="valorEstorno" inputmode="decimal" autocomplete="off" placeholder="0,00">

      <label>Motivo do estorno</label>
      <select id="motivoEstorno">
        <option value="">Selecione o motivo</option>
        <option value="CANCELAMENTO_EVENTO">Cancelamento do evento</option>
        <option value="ERRO_LANCAMENTO">Erro de lançamento</option>
        <option value="DEVOLUCAO_VALOR">Devolução de valor</option>
        <option value="OUTROS">Outros</option>
      </select>

      <button class="btn danger" onclick="submitEstorno()">🔴 Confirmar Estorno</button>
    </div>
  `;
  aplicarMascaraMonetariaPorIds_(['valorEstorno']);
}
function submitEstorno(){
  const btn = event?.target;
  if (lockSubmit) return;

  const idRecebimento = document.getElementById('idRecebimento').value.trim();
  const valor = parseValorSeguro(document.getElementById('valorEstorno').value);
  const motivo = document.getElementById('motivoEstorno').value;

  if (!idRecebimento) return alert('Informe o ID do recebimento');
  if (!valor) return alert('Informe um valor de estorno válido');

  if (!confirm('Deseja realmente estornar este recebimento?')) return;

  lockSubmit = true;
  bloquearBotao(btn);
  showLoading('Registrando estorno...');

  const payload = {
    idRecebimento: idRecebimento,
    valor: valor,
    motivo: motivo,
    operationKey: obterOuCriarOperationKey('estorno')
  };

  Auth.apiCall('apiEstornarRecebimento', payload)
  .then(resp => {
    hideLoading();
    lockSubmit = false;
    liberarBotao(btn);

    if (!resp || resp.sucesso !== true) {
      alert(resp?.mensagem || 'Erro ao registrar estorno');
      return;
    }

    consumirOperationKey('estorno');
    resumo.innerHTML = '<span class="muted">Estorno registrado com sucesso</span>';
    alert('Estorno realizado com sucesso');
  })
  .catch(err => {
    hideLoading();
    lockSubmit = false;
    liberarBotao(btn);
    tratarErroApi(err);
  });
}

/* ================= RECEBIMENTO ================= */

    <div id="evSug" class="autocomplete"></div>

/* ================= COMISSAO ================= */

async function garantirVendedoresCarregados(callback){
  if (Array.isArray(vendedoresCache) && vendedoresCache.length > 0) {
    callback();
    return;
  }

  try {
    vendedoresCache = await Auth.apiCall('listarVendedores') || [];
    callback();
  } catch (err) {
    console.error('Erro ao carregar vendedores:', err);
    alert('Erro ao carregar vendedores');
  }
}

function renderComissao(){
  resumo.innerHTML = '<span class="muted">Selecione um vendedor</span>';

  form.innerHTML = `
    <h3>Comissão</h3>

    <label>Vendedor</label>
    <select id="selectVendedor"></select>

    <div class="divider"></div>

    <h4>Fechamento de Comissão (V2)</h4>
    <p class="muted">
      Este processo paga <strong>100% das comissões pendentes</strong> do vendedor selecionado,
      independentemente de data ou período.
    </p>

    <div class="divider"></div>
    <p class="muted">
      ⚠️ Atenção: esta ação é irreversível. Todas as comissões pendentes serão marcadas como pagas
      e o valor será acumulado em <strong>VALOR_COMISSAO_PAGO</strong> nos eventos.
    </p>

    <div class="divider"></div>
    <h4>Ajustes Detalhados (Opcional)</h4>
    <p class="muted">
      Adicione quantos itens quiser (crédito/débito) com descrição.
      O sistema soma automaticamente os totais abaixo.
    </p>
    <div id="ajustesDetalhadosComissao"></div>
    <button type="button" class="btn secondary" onclick="adicionarAjusteDetalhadoComissao_()">+ Adicionar Ajuste</button>

    <label>Total Ajuste Crédito (auto)</label>
    <input type="number" id="ajCredito" value="0" readonly>

    <label>Total Ajuste Débito (auto)</label>
    <input type="number" id="ajDebito" value="0" readonly>

    <label>Link Comprovante Pagamento</label>
    <input id="linkPagamento">
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="file" id="fileComprovanteFechamento" accept="image/png,image/jpeg,application/pdf">
      <button type="button" class="btn secondary"
        onclick="uploadComprovanteParaCampo('fileComprovanteFechamento','linkPagamento','FECHAMENTO_COMISSAO', vendedorSelecionado?.id || '')">
        📎 Carregar Comprovante
      </button>
    </div>

    <label style="margin-top:16px">
      <input type="checkbox" id="confirmarFechamento">
      Confirmo que revisei os valores e desejo gerar o fechamento.
    </label>

    <button class="btn secondary" onclick="executarFechamentoV2()">
      🔒 Executar Fechamento
    </button>
  `;

  garantirVendedoresCarregados(()=>{
    const sel = document.getElementById('selectVendedor');
    if (!sel) return;
    sel.innerHTML = '<option value="">Selecione...</option>';
    vendedoresCache.forEach(v=>{
      const o = document.createElement('option');
      o.value = v.id;
      o.textContent = v.id + ' — ' + v.nome;
      sel.appendChild(o);
    });
    sel.onchange = ()=>{
      vendedorSelecionado = vendedoresCache.find(v=>v.id==sel.value);
      if (vendedorSelecionado) carregarResumoVendedor();
    };
  });

  inicializarAjustesDetalhadosComissao_();
}

function inicializarAjustesDetalhadosComissao_() {
  ajustesDetalhadosComissao = [];
  renderAjustesDetalhadosComissao_();
  recalcularTotaisAjustesDetalhadosComissao_();
}

function adicionarAjusteDetalhadoComissao_() {
  ajustesDetalhadosComissao.push({
    id: 'AJ-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
    tipo: 'CREDITO',
    valor: 0,
    descricao: ''
  });
  renderAjustesDetalhadosComissao_();
  recalcularTotaisAjustesDetalhadosComissao_();
}

function removerAjusteDetalhadoComissao_(id) {
  ajustesDetalhadosComissao = (ajustesDetalhadosComissao || []).filter(a => a.id !== id);
  renderAjustesDetalhadosComissao_();
  recalcularTotaisAjustesDetalhadosComissao_();
}

function atualizarAjusteDetalhadoComissao_(id, campo, valor) {
  const item = (ajustesDetalhadosComissao || []).find(a => a.id === id);
  if (!item) return;
  if (campo === 'tipo') {
    item.tipo = String(valor || '').toUpperCase() === 'DEBITO' ? 'DEBITO' : 'CREDITO';
  } else if (campo === 'valor') {
    item.valor = parseValorSeguro(valor) || 0;
  } else if (campo === 'descricao') {
    item.descricao = String(valor || '').trim();
  }
  recalcularTotaisAjustesDetalhadosComissao_();
}

function renderAjustesDetalhadosComissao_() {
  const box = document.getElementById('ajustesDetalhadosComissao');
  if (!box) return;

  if (!ajustesDetalhadosComissao.length) {
    box.innerHTML = '<div class="muted" style="margin-bottom:8px">Nenhum ajuste detalhado adicionado.</div>';
    return;
  }

  box.innerHTML = ajustesDetalhadosComissao.map(a => `
    <div style="display:grid;grid-template-columns:120px 120px 1fr 36px;gap:8px;align-items:center;margin-bottom:8px">
      <select onchange="atualizarAjusteDetalhadoComissao_('${a.id}','tipo',this.value)">
        <option value="CREDITO" ${a.tipo === 'CREDITO' ? 'selected' : ''}>Crédito</option>
        <option value="DEBITO" ${a.tipo === 'DEBITO' ? 'selected' : ''}>Débito</option>
      </select>
      <input type="number" min="0" step="0.01" value="${Number(a.valor || 0)}"
        oninput="atualizarAjusteDetalhadoComissao_('${a.id}','valor',this.value)">
      <input type="text" value="${String(a.descricao || '').replace(/"/g, '&quot;')}"
        placeholder="Descrição do ajuste"
        oninput="atualizarAjusteDetalhadoComissao_('${a.id}','descricao',this.value)">
      <button type="button" class="btn danger" style="padding:6px 0" onclick="removerAjusteDetalhadoComissao_('${a.id}')">✕</button>
    </div>
  `).join('');
}

function recalcularTotaisAjustesDetalhadosComissao_() {
  let totalCredito = 0;
  let totalDebito = 0;
  (ajustesDetalhadosComissao || []).forEach(a => {
    const valor = Number(a.valor || 0);
    if (valor <= 0) return;
    if (String(a.tipo || '').toUpperCase() === 'DEBITO') totalDebito += valor;
    else totalCredito += valor;
  });

  const ajCred = document.getElementById('ajCredito');
  const ajDeb = document.getElementById('ajDebito');
  if (ajCred) ajCred.value = totalCredito.toFixed(2);
  if (ajDeb) ajDeb.value = totalDebito.toFixed(2);
  atualizarResumoLiquidoComissao_();
}

function atualizarResumoLiquidoComissao_() {
  const card = document.getElementById('resumoLiquidoComissao');
  if (!card || !previewComissaoAtual) return;

  const base = Number(previewComissaoAtual.totalComissao || 0) + Number(previewComissaoAtual.totalAjuste || 0);
  const credito = parseValorSeguro(document.getElementById('ajCredito')?.value) || 0;
  const debito = parseValorSeguro(document.getElementById('ajDebito')?.value) || 0;
  const liquido = base + credito - debito;

  card.innerHTML =
    `<strong>Valor líquido para transferir:</strong> R$ ${liquido.toFixed(2)} ` +
    `<span class="muted">(base R$ ${base.toFixed(2)} + crédito R$ ${credito.toFixed(2)} - débito R$ ${debito.toFixed(2)})</span>`;
}

function submitSaidaEvento() {
  const btn = event?.target;
  if (lockSubmit) return;
  if (!eventoSelecionado) return alert('Selecione um evento');

  const tipo = document.getElementById('tipoSaida').value;
  if (!tipo) return alert('Selecione o tipo de saída');
  if (ehSocio_() && tipo !== 'BV_EVENTO') {
    return alert('Perfil Administrador autorizado apenas para saída do tipo BV.');
  }

  let valor = 0;
  let observacoes = '';
  let comprovante = '';
  let dataSaida = '';

  if (tipo === 'NF_EVENTO' || tipo === 'BV_EVENTO') {
    valor = parseValorSeguro(document.getElementById('valorSaida').value);
    comprovante = document.getElementById('comprovanteSaida')?.value || '';
    observacoes = document.getElementById('obsSaida')?.value || '';
    dataSaida = document.getElementById('dataSaida')?.value || hojeLocalISO();
    if (!valor) return alert('Valor inválido');
  }

  if (tipo === 'FOLHA_EVENTO') {
    valor = parseValorSeguro(document.getElementById('valorSaida').value);
    observacoes = document.getElementById('obsSaida')?.value || '';
    if (!valor) return alert('Informe o valor da folha');
    if (!observacoes) return alert('Descreva os custos da folha');
  }

  if (!confirm('Confirmar registro desta saída?')) return;

  lockSubmit = true;
  bloquearBotao(btn);
  showLoading('Registrando saída...');

  const payload = {
    tipoOperacao: 'SAIDA_EVENTO',
    tipoSaida: tipo,
    idEvento: eventoSelecionado,
    valor: valor,
    dataSaida: dataSaida,
    observacoes: observacoes,
    linkComprovante: comprovante,
    operationKey: obterOuCriarOperationKey('saida')
  };

  Auth.apiCall('apiRegistrarSaidaEvento', payload)
  .then(resp => {
    hideLoading();
    lockSubmit = false;
    liberarBotao(btn);

    if (!resp || resp.sucesso !== true) {
      alert(resp?.mensagem || 'Erro ao registrar saída');
      return;
    }

    consumirOperationKey('saida');
    alert('Saída registrada com sucesso');
    resetObrigacaoForm();
  })
  .catch(err => {
    hideLoading();
    lockSubmit = false;
    liberarBotao(btn);
    tratarErroApi(err);
  });
}

async function carregarFiscalizacao_(executarAuditoria) {
  try {
    showLoading('Carregando fiscalização financeira...');

    atualizarBadgeFiscalizacao_(fiscalEventosCache);

async function executarAuditoriaFiscalizacao_(silencioso) {
  try {
    if (!silencioso) showLoading('Executando auditoria de integridade...');
    const diag = await Auth.apiCall('diagnosticarIntegridadeFinanceira', { limit: 1000 });
    if (!silencioso) hideLoading();
    if (!diag || diag.sucesso !== true) {
      fiscalDivergenciasAuditoriaMap = new Map();
      resumo.innerHTML = '<span class="muted">Falha na auditoria de integridade.</span>';
      return;
    }
    // Índice de divergências por evento para alinhar filtros da UI com o resumo da auditoria.
    fiscalDivergenciasAuditoriaMap = new Map();
    (diag.divergencias || []).forEach(d => {
      const id = String(d?.idEvento || '').trim();
      const tipo = String(d?.tipo || '').trim();
      if (!id) return;
      if (!fiscalDivergenciasAuditoriaMap.has(id)) fiscalDivergenciasAuditoriaMap.set(id, []);
      if (tipo) fiscalDivergenciasAuditoriaMap.get(id).push(tipo);
    });

    const r = diag.resumo || {};
    resumo.innerHTML = `
      <div><strong>Eventos analisados:</strong> ${Number(r.eventosAnalisados || 0)}</div>
      <div><strong>Divergências:</strong> ${Number(r.divergencias || 0)}</div>
      <div><strong>Eventos com divergência:</strong> ${Number(r.eventosComDivergencia || 0)}</div>
      <div class="muted" style="margin-top:8px">Última auditoria executada agora.</div>
    `;
  } catch (err) {
    if (!silencioso) hideLoading();
    console.error('Erro na auditoria:', err);
    fiscalDivergenciasAuditoriaMap = new Map();
    resumo.innerHTML = '<span class="muted">Erro ao executar auditoria.</span>';
  }
}

function aplicarFiltrosFiscalizacao_() {
  const busca = String(document.getElementById('filtroFiscalBusca')?.value || '').trim().toLowerCase();
  const tipo = String(document.getElementById('filtroFiscalTipo')?.value || 'TODOS');
  let lista = Array.isArray(fiscalEventosCache) ? [...fiscalEventosCache] : [];

  if (busca) {
    lista = lista.filter(ev => {
      const hay = [
        String(ev.idEvento || ''),
        String(ev.nomeEvento || ''),
        String(ev.nomeContratante || '')
      ].join(' ').toLowerCase();
      return hay.indexOf(busca) >= 0;
    });
  }

  if (tipo !== 'TODOS') {
    lista = lista.filter(ev => {
      const alertas = Array.isArray(ev.alertas) ? ev.alertas : [];
      const alertasCriticos = alertas.filter(a => !alertaEhInformativo_(a));
      const divergencias = Array.isArray(ev.divergencias) ? ev.divergencias : [];
      const divergenciasAuditoria = fiscalDivergenciasAuditoriaMap.get(String(ev.idEvento || '')) || [];
      const legado = !!(ev.metadados && ev.metadados.legado);
      if (tipo === 'COM_ALERTA') return alertasCriticos.length > 0;
      if (tipo === 'COM_DIVERGENCIA') return divergencias.length > 0 || divergenciasAuditoria.length > 0;
      if (tipo === 'AVISO_RECEBIDO_MAIOR') return alertas.includes('INCONSISTENCIA_RECEBIDO_MAIOR_QUE_CONTRATO');
      if (tipo === 'QUITADO_BV_PENDENTE') return alertas.includes('EVENTO_QUITADO_COM_BV_PENDENTE');
      if (tipo === 'QUITADO_NF_PENDENTE') return alertas.includes('EVENTO_QUITADO_COM_NF_PENDENTE');
      if (tipo === 'SEM_FOLHA') return alertas.includes('FOLHA_NAO_REGISTRADA');
      if (tipo === 'LEGADO') return legado;
      return true;
    });
  }

  // Ordenação de prioridade para "Todos":
  // 1) divergências/alertas críticos
  // 2) avisos informativos
  // 3) sem pendências
  const prioridadeFiscal_ = function (ev) {
    const alertas = Array.isArray(ev?.alertas) ? ev.alertas : [];
    const alertasCriticos = alertas.filter(a => !alertaEhInformativo_(a));
    const divergencias = Array.isArray(ev?.divergencias) ? ev.divergencias : [];
    const divergenciasAuditoria = fiscalDivergenciasAuditoriaMap.get(String(ev?.idEvento || '')) || [];
    if (divergencias.length > 0 || divergenciasAuditoria.length > 0 || alertasCriticos.length > 0) return 0;
    if (alertas.length > 0) return 1;
    return 2;
  };

  const normalizarDataFiscalSort_ = function (valor) {
    if (!valor) return Number.MAX_SAFE_INTEGER;
    if (Object.prototype.toString.call(valor) === '[object Date]' && !isNaN(valor.getTime())) {
      return valor.getTime();
    }
    const s = String(valor).trim();
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
      const [d, m, a] = s.split('/').map(Number);
      return new Date(a, m - 1, d).getTime();
    }
    const dt = new Date(s);
    return isNaN(dt.getTime()) ? Number.MAX_SAFE_INTEGER : dt.getTime();
  };

  lista.sort((a, b) => {
    const pa = prioridadeFiscal_(a);
    const pb = prioridadeFiscal_(b);
    if (pa !== pb) return pa - pb;
    return normalizarDataFiscalSort_(a?.dataEvento) - normalizarDataFiscalSort_(b?.dataEvento);
  });

  renderListaFiscalizacao_(lista);
}

function renderListaFiscalizacao_(lista) {
  const box = document.getElementById('listaFiscalizacao');
  if (!box) return;
  if (!Array.isArray(lista) || lista.length === 0) {
    box.innerHTML = '<div class="muted">Nenhum evento encontrado para este filtro.</div>';
    return;
  }

  box.innerHTML = lista.map(ev => {
    const alertas = Array.isArray(ev.alertas) ? ev.alertas : [];
    const alertasCriticos = alertas.filter(a => !alertaEhInformativo_(a));
    const divergencias = Array.isArray(ev.divergencias) ? ev.divergencias : [];
    const divergenciasAuditoria = fiscalDivergenciasAuditoriaMap.get(String(ev.idEvento || '')) || [];
    const cardClasse = (divergencias.length > 0 || divergenciasAuditoria.length > 0) ? 'fiscal-card erro' : (alertasCriticos.length > 0 ? 'fiscal-card alerta' : 'fiscal-card');
    const bvStatus = String(ev?.bv?.status || ev?.custos?.bv?.status || 'N/A');
    const bvValor = Number(ev?.bv?.valor || ev?.custos?.bv?.valor || 0);
    const podePagarBV = !!(ev?.acoes?.podePagarBV);
    const contratante = escaparHtml_(String(ev.nomeContratante || 'N/A'));
    const nomeEvento = escaparHtml_(String(ev.nomeEvento || 'Evento'));
    const idEvento = String(ev.idEvento || '');
    const dataEvento = formatarDataFiscalizacao_(ev.dataEvento);
    const tipoEvento = escaparHtml_(String(ev.tipoEvento || extrairTipoEventoFiscalizacao_(ev.nomeEvento) || 'Evento'));
    const podeGerenciarCompleto = ehProprietario_();

    return `
      <div class="${cardClasse}">
        <div class="fiscal-top">
          <div>
            <div><strong>${dataEvento} - ${contratante}</strong></div>
            <div class="fiscal-id">${escaparHtml_(idEvento)} • ${tipoEvento}</div>
          </div>
          <div><strong>${escaparHtml_(String(ev.status || 'ok').toUpperCase())}</strong></div>
        </div>
        <div class="muted">
          Recebido: R$ ${Number(ev.totalRecebido || 0).toFixed(2)} •
          Pendente: R$ ${Number(ev.valorPendente || 0).toFixed(2)} •
          BV: R$ ${bvValor.toFixed(2)} (${escaparHtml_(bvStatus)})
        </div>
        <div class="fiscal-tags">
          ${alertas.map(a => `<span class="fiscal-tag">${alertaEhInformativo_(a) ? 'ℹ️' : '⚠️'} ${escaparHtml_(labelAlerta_(a))}</span>`).join('')}
          ${divergencias.map(d => `<span class="fiscal-tag">🧩 ${escaparHtml_(labelDivergencia_(d))}</span>`).join('')}
          ${divergenciasAuditoria.slice(0, 3).map(d => `<span class="fiscal-tag">🧩 ${escaparHtml_(humanizarCodigoTecnico_(d))}</span>`).join('')}
          ${divergenciasAuditoria.length > 3 ? `<span class="fiscal-tag">🧩 +${divergenciasAuditoria.length - 3} divergências</span>` : ''}
          ${ev?.metadados?.legado ? '<span class="fiscal-tag">📦 LEGADO</span>' : ''}
        </div>
        <div class="fiscal-actions">
          ${podeGerenciarCompleto ? `<button class="btn secondary" onclick="abrirEdicaoEventoFinanceiro_('${escaparAttr_(idEvento)}')">Editar</button>` : ''}
          ${podeGerenciarCompleto ? `<button class="btn secondary" onclick="abrirSaidasEventoFinanceiro_('${escaparAttr_(idEvento)}','${escaparAttr_(contratante)}','${escaparAttr_(nomeEvento)}')">Saídas</button>` : ''}
          ${podeGerenciarCompleto ? `<button class="btn primary" onclick="reconciliarEventoFinanceiro_('${escaparAttr_(idEvento)}')">Reconciliar</button>` : ''}
          ${podePagarBV
            ? `<button class="btn danger" onclick="processarBVEventoFinanceiro_('${escaparAttr_(idEvento)}', ${bvValor})">Processar BV</button>`
            : '<button class="btn secondary" disabled style="opacity:.6">BV OK</button>'}
        </div>
      </div>
    `;
  }).join('');
}

function formatarDataFiscalizacao_(valor) {
  if (!valor) return '--/--/----';
  if (Object.prototype.toString.call(valor) === '[object Date]' && !isNaN(valor.getTime())) {
    const d = valor;
    return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
  }
  const str = String(valor).trim();
  const br = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (br) return str;
  const iso = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return iso[3] + '/' + iso[2] + '/' + iso[1];
  return str;
}

function extrairTipoEventoFiscalizacao_(nomeEvento) {
  const txt = String(nomeEvento || '');
  const pos = txt.indexOf(' - ');
  return pos > 0 ? txt.slice(0, pos) : txt;
}

  window.location.href = 'editar-evento.html?id=' + encodeURIComponent(idEvento);

function abrirSaidasEventoFinanceiro_(idEvento, contratante, nomeEvento) {

  const botaoSaidas = document.querySelector('.intent button[data-mode="obrigacao"]');
  if (botaoSaidas) botaoSaidas.click();

  const inp = document.getElementById('inputEvento');

  selectEvento({
    id: idEvento,
    contratante: contratante || '',
    tipoEvento: nomeEvento || ''
  });
}

async function reconciliarEventoFinanceiro_(idEvento) {
  if (!idEvento) return;
  if (!confirm('Reconciliar espelho financeiro deste evento com as movimentações?')) return;
  try {
    showLoading('Reconciliando evento...');
    const resp = await Auth.apiCall('reconciliarResumoFinanceiroEvento', { idEvento });
    hideLoading();
    if (!resp || resp.sucesso !== true) {
      alert(resp?.mensagem || 'Falha ao reconciliar evento');
      return;
    }
    alert('Evento reconciliado com sucesso.');
    await carregarFiscalizacao_(true);
  } catch (err) {
    hideLoading();
    tratarErroApi(err);
  }
}

async function processarBVEventoFinanceiro_(idEvento, valorBV) {
  if (!idEvento) return;
  if (!confirm('Confirmar processamento de BV para este evento?')) return;
  try {
    showLoading('Processando BV...');
    const resp = await Auth.apiCall('apiRegistrarSaidaEvento', {
      tipoOperacao: 'SAIDA_EVENTO',
      tipoSaida: 'BV_EVENTO',
      idEvento: idEvento,
      valor: Number(valorBV || 0),
      dataSaida: hojeLocalISO(),
      observacoes: 'BV processado via painel de fiscalização',
      linkComprovante: '',
      operationKey: obterOuCriarOperationKey('saida')
    });
    hideLoading();
    if (!resp || resp.sucesso !== true) {
      alert(resp?.mensagem || 'Falha ao processar BV');
      return;
    }
    consumirOperationKey('saida');
    alert('BV processado com sucesso.');
    await carregarFiscalizacao_(false);
  } catch (err) {
    hideLoading();
    tratarErroApi(err);
  }
}

function escaparHtml_(txt) {
  return String(txt || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escaparAttr_(txt) {
  return escaparHtml_(txt).replace(/`/g, '');
}

/* ================= AUTOCOMPLETE EVENTO ================= */

async function buscarEvento(q){
  const termo = String(q || '').trim();
  const box = document.getElementById('evSug');
  if (!box) return;

  if (!termo || termo.length < 2) {
    box.innerHTML = '';
    return;
  }

  if (buscaEventoTimer) clearTimeout(buscaEventoTimer);
  const seq = ++buscaEventoSeq;
  buscaEventoTimer = setTimeout(() => {
    executarBuscaEvento_(termo, seq).catch(err => {
      console.error('Erro ao buscar evento:', err);
      box.innerHTML = '';
    });
  }, BUSCA_EVENTO_DEBOUNCE_MS);
}

function renderSugestoesEvento_(list) {
  const box = document.getElementById('evSug');
  if (!box) return;
  box.innerHTML = '';

  (list || []).forEach(ev => {
    const d = document.createElement('div');
    const data = String(ev.dataFormatada || '--/--/----');
    const contratante = String(ev.contratante || 'Sem contratante');
    const id = String(ev.id || '');
    const tipo = String(ev.tipoEvento || ev.tipoRegistro || 'Evento');
    d.innerHTML = `
      <div class="ac-line-1">${escaparHtml_(data)} • ${escaparHtml_(contratante)}</div>
      <div class="ac-line-2">${escaparHtml_(id)} • ${escaparHtml_(tipo)}</div>
    `;
    d.onclick = () => selectEvento(ev);
    box.appendChild(d);
  });
}

function obterCacheBuscaEvento_(termoKey) {
  const entry = buscaEventoCache.get(termoKey);
  if (!entry) return null;
  if ((Date.now() - entry.ts) > BUSCA_EVENTO_CACHE_TTL_MS) {
    buscaEventoCache.delete(termoKey);
    return null;
  }
  return entry.list || [];
}

function setCacheBuscaEvento_(termoKey, list) {
  buscaEventoCache.set(termoKey, { ts: Date.now(), list: Array.isArray(list) ? list : [] });
}

function filtrarListaLocalBuscaEvento_(list, termo) {
  const t = String(termo || '').trim().toLowerCase();
  return (list || []).filter(ev => {
    const hay = [
      String(ev.id || ''),
      String(ev.contratante || ''),
      String(ev.tipoEvento || ''),
      String(ev.tipoRegistro || '')
    ].join(' ').toLowerCase();
    return hay.includes(t);
  });
}

async function executarBuscaEvento_(termo, seq) {
  const termoKey = String(termo || '').trim().toLowerCase();
  if (!termoKey || termoKey.length < 2) return;

  const box = document.getElementById('evSug');
  if (!box) return;

  // 1) Cache exato (rápido)
  const cacheExato = obterCacheBuscaEvento_(termoKey);
  if (cacheExato) {
    if (seq !== buscaEventoSeq) return;
    renderSugestoesEvento_(cacheExato);
    return;
  }

  // 2) Prefixo em cache (preview rápido) enquanto consulta API
  let melhorPrefixo = '';
  let preview = null;
  buscaEventoCache.forEach((entry, key) => {
    if (!termoKey.startsWith(key)) return;
    if (key.length < 2 || key.length <= melhorPrefixo.length) return;
    const listaValida = obterCacheBuscaEvento_(key);
    if (!listaValida) return;
    melhorPrefixo = key;
    preview = filtrarListaLocalBuscaEvento_(listaValida, termoKey).slice(0, 20);
  });
  if (preview && preview.length && seq === buscaEventoSeq) {
    renderSugestoesEvento_(preview);
  }

  // 3) Fonte da verdade (API)
  try {
    const list = await Auth.apiCall('buscarEventoPorContratante', { nome: termoKey });
    if (seq !== buscaEventoSeq) return;
    setCacheBuscaEvento_(termoKey, list || []);
    renderSugestoesEvento_(list || []);
  } catch (err) {
    if (seq !== buscaEventoSeq) return;
    console.error('Erro ao buscar evento:', err);
    box.innerHTML = '';
  }
}

async function selectEvento(ev){

  resumo.innerHTML = '<span class="muted">Carregando resumo financeiro...</span>';

  try {
  const fin = await Auth.apiCall('buscarResumoFinanceiroEvento', {
    idEvento: idEventoReal
  });

  ultimoResumoFinanceiro = fin;

  if (!fin) {
    resumo.innerHTML = '<span class="muted">Resumo financeiro indisponível</span>';
    return;

  const vt = Number(fin.valorTotal) || 0;
  let vr = Number(fin.valorRecebido);
  let vp = Number(fin.valorPendente);

  if (isNaN(vr)) {
    vr = vt - (isNaN(vp) ? 0 : vp);
  }

  if (isNaN(vp)) {
    vp = vt - (isNaN(vr) ? 0 : vr);
  }

  let extraHtml = '';

    ? window.StatusFormatters.labelStatusRecebimento(fin.statusRecebimento, {
        valorRecebido: vr,
        valorPendente: vp,
        valorTotal: vt,
        detailed: true
      })
    : (fin.statusRecebimento || '—');

  if (vp < 0) {
    const excedente = Math.abs(vp);
    extraHtml = `
      <div style="margin-top:6px;color:#facc15">
        ⚠️ Valor pago a mais: R$ ${excedente.toFixed(2)}
      </div>
    `;
    statusFinal = 'Quitado (com excedente)';
  }

  const valorBV = Number(fin.valorBV || 0);
  const statusBV = String(fin.statusBV || 'N/A');
  const valorNF = Number(fin.valorNF || 0);
  const statusNF = String(fin.statusNF || 'N/A');
  const folhaValor = Number(fin.folhaCustoValor || 0);
  const bvBadge = fin.bvPendente ? '⚠️ PENDENTE' : (statusBV || 'N/A');
  const nfBadge = fin.nfPendente ? '⚠️ PENDENTE' : (statusNF || 'N/A');

  const alertas = Array.isArray(fin.alertas) ? fin.alertas : [];
  const divergencias = Array.isArray(fin.divergencias) ? fin.divergencias : [];

  resumo.innerHTML = `
    <div><strong>Evento:</strong> ${ev.tipoEvento}</div>
    <div><strong>Contratante:</strong> ${ev.contratante}</div>
    <div class="divider"></div>
    <div><strong>Valor total do evento:</strong> R$ ${vt.toFixed(2)}</div>
    <div><strong>Valor recebido até agora:</strong> R$ ${vr.toFixed(2)}</div>
    <div><strong>Valor pendente atual:</strong> R$ ${vp.toFixed(2)}</div>
    ${extraHtml}
    <div><strong>Status:</strong> ${statusFinal}</div>
    <div class="divider"></div>
    <div><strong>Saídas do evento (resumo):</strong></div>
    <div>• BV: R$ ${valorBV.toFixed(2)} — <strong>${bvBadge}</strong></div>
    <div>• NF: ${fin.temNF ? ('R$ ' + valorNF.toFixed(2)) : 'Não configurada'} — <strong>${nfBadge}</strong></div>
    <div>• Folha de custo: R$ ${folhaValor.toFixed(2)} — <strong>${folhaBadge}</strong></div>
    ${alertas.length ? `<div class="divider"></div><div><strong>Alertas:</strong> ${alertas.map(a => `⚠️ ${labelAlerta_(a)}`).join(' • ')}</div>` : ''}
    ${divergencias.length ? `<div style="margin-top:6px"><strong>Divergências:</strong> ${divergencias.map(d => `🧩 ${labelDivergencia_(d)}`).join(' • ')}</div>` : ''}
  `;

  if (mode === 'obrigacao') {

    if (tipoSaidaEl && tipoSaidaEl.value) {

} catch (err) {

  resumo.innerHTML = '<span class="muted">Erro ao carregar resumo financeiro</span>';
}

function carregarResumoVendedor(){
  resumo.innerHTML = '<span class="muted">Carregando resumo do fechamento...</span>';
  previewComissaoAtual = null;

  Auth.apiCall('visualizarPreviewFechamento', {
    idVendedor: vendedorSelecionado.id
  })
  .then(preview => {
    previewComissaoAtual = preview || null;
    ultimoPreview = preview;

    // ================= NOVA REGRA DE FILTRO DO PREVIEW DE FECHAMENTO =================
    // Exibe:
    // 1) Comissões com STATUS === 'PENDENTE'
    // 2) Comissões já incluídas em fechamento do tipo COMISSAO_GERADA que tenham estorno de recebimento posterior sem ajuste de comissão resolvido
    //    (marcando ajusteNecessario: true, ajusteComissao: valorNegativoCalculado)
    // 3) NÃO exibe comissões já ajustadas (ou seja, se já existe movimentação AJUSTE_COMISSAO_ESTORNO PROCESSADA para aquela comissão)
    if (Array.isArray(preview.eventos)) {
      // Para facilitar, indexa movimentações por tipo e referência
      const movsPorTipo = {};
      if (Array.isArray(preview.movimentacoes)) {
        preview.movimentacoes.forEach(mov => {
          if (!movsPorTipo[mov.tipo]) movsPorTipo[mov.tipo] = [];
          movsPorTipo[mov.tipo].push(mov);
        });
      }
      // Helper para encontrar estorno de recebimento relacionado a uma comissão
      function encontrarEstornosParaComissao(ev) {
        // Suporta Ref: MOV-XXXX em ev.referenciaMovimentacao ou campo similar
        const ref = (ev.referenciaMovimentacao || ev.referencia || ev.refMovimentacao || ev.idMovimentacao || ev.idMovRecebimento || '').toString();
        if (!ref) return [];
        // Procurar estornos de recebimento relacionados ao mesmo MOV-XXXX
        const estornos = (movsPorTipo['ESTORNO_RECEBIMENTO'] || []).filter(mov => {
          // Checa se referenciaMovimentacao ou descricao contém o id da movimentação original
          // O padrão é "Ref: MOV-XXXX"
          if (mov.referenciaMovimentacao && mov.referenciaMovimentacao === ref) return true;
          if (mov.descricao && ref && mov.descricao.includes(ref)) return true;
          if (ref && mov.referencia && mov.referencia === ref) return true;
          // Também aceita se o número do MOV-XXXX está no campo descrição
          if (ref && mov.descricao && ref.replace('MOV-', '') && mov.descricao.includes(ref.replace('MOV-', ''))) return true;
          return false;
        });
        return estornos;
      }
      // Helper para saber se já existe ajuste de comissão estorno processado para essa comissão
      function existeAjusteComissaoEstorno(ev) {
        // Procura movimentação do tipo AJUSTE_COMISSAO_ESTORNO ligada a este ev (pelo id da comissão ou referencia)
        const ref = (ev.referenciaMovimentacao || ev.referencia || ev.refMovimentacao || ev.idMovimentacao || ev.idMovRecebimento || '').toString();
        return (movsPorTipo['AJUSTE_COMISSAO_ESTORNO'] || []).some(mov => {
          // Considera resolvido se estiver processado e ligado à mesma referência
          const statusOk = (mov.status === 'PROCESSADO' || mov.status === 'FINALIZADO' || !mov.status); // fallback: sem status = processado
          if (!statusOk) return false;
          if (mov.referenciaMovimentacao && mov.referenciaMovimentacao === ref) return true;
          if (mov.descricao && ref && mov.descricao.includes(ref)) return true;
          if (ref && mov.referencia && mov.referencia === ref) return true;
          if (ref && mov.descricao && ref.replace('MOV-', '') && mov.descricao.includes(ref.replace('MOV-', ''))) return true;
          return false;
        });
      }
      // Helper para calcular ajuste de comissão proporcional ao estorno
      function calcularAjusteComissao(ev, estornoMov) {
        // Proporção: valor do estorno / valor do recebimento original * valor da comissão original
        const valorRecebido = Number(ev.valorRecebido || 0);
        const valorComissao = Number(ev.valorComissao || 0);
        const valorEstornado = Number(estornoMov.valor || 0);
        if (!valorRecebido || !valorComissao || !valorEstornado) return 0;
        // Calcula proporcional negativo
        const prop = valorEstornado / valorRecebido;
        const ajuste = -1 * Math.abs(Number((valorComissao * prop).toFixed(2)));
        return ajuste;
      }
      // Aplica o filtro final
      preview.eventos = preview.eventos
        .map(ev => {
          // 1. STATUS PENDENTE: sempre inclui
          if (ev.statusComissao === 'PENDENTE') return ev;
          // 2. Comissões já fechadas do tipo COMISSAO_GERADA:
          if (
            ev.tipoComissao === 'COMISSAO_GERADA' &&
            ev.statusComissao !== 'PENDENTE' &&
            (ev.incluidoEmFechamento || ev.incluido_em_fechamento || ev.INCLUIDO_EM_FECHAMENTO)
          ) {
            // Só inclui se houver estorno posterior relacionado e NÃO houver ajuste já processado
            if (existeAjusteComissaoEstorno(ev)) return null; // já ajustada, não exibe
            const estornos = encontrarEstornosParaComissao(ev);
            if (estornos.length > 0) {
              // Soma todos os ajustes necessários (caso haja múltiplos estornos)
              const ajusteTotal = estornos.reduce((soma, est) => soma + calcularAjusteComissao(ev, est), 0);
              if (ajusteTotal !== 0) {
                // Retorna um novo objeto com ajusteNecessario, ajusteComissao
                return {
                  ...ev,
                  ajusteNecessario: true,
                  ajusteComissao: ajusteTotal
                };
              }
            }
            // Se não há estorno não ajustado, não exibe
            return null;
          }
          // 3. Para outros casos, descarta (ex: já incluída em fechamento e sem ajuste pendente)
          return null;
        })
        .filter(ev => !!ev);

      // Recalcula totais após filtro
      preview.totalEventos = preview.eventos.length;
      preview.totalComissao = preview.eventos.reduce(
        (s, e) => s + (Number(e.valorComissao || 0) + Number(e.ajusteComissao || 0)),
        0
      );
    }

    // 1️⃣ Preview não retornou nada (erro silencioso no backend)
    if (!preview) {
      resumo.innerHTML = `
        <div><strong>Vendedor:</strong> ${vendedorSelecionado.nome}</div>
        <div class="muted">Erro ao gerar resumo (resposta vazia)</div>
      `;
      return;
    }

    // 2️⃣ Backend retornou erro explícito
    if (preview.sucesso === false) {
      resumo.innerHTML = `
        <div><strong>Vendedor:</strong> ${vendedorSelecionado.nome}</div>
        <div class="muted">Erro ao gerar resumo: ${preview.mensagem}</div>
      `;
      return;
    }

    // 3️⃣ Nenhuma comissão pendente (mas pode haver ajuste por estorno)
    if (!Array.isArray(preview.eventos) || preview.eventos.length === 0) {
      const existeAjuste =
        preview.existeAjustePendentes === true ||
        (Array.isArray(preview.ajustesPendentes) && preview.ajustesPendentes.length > 0) ||
        (typeof preview.totalAjuste === 'number' && preview.totalAjuste !== 0);

      let alertaAjusteHtml = '';
      if (existeAjuste) {
        alertaAjusteHtml = `
  <div style="
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    background:#7c2d12;
    color:#fed7aa;
    font-size:13px;
  ">
    ⚠️ <strong>Ajuste de comissão por estorno</strong><br><br>

    Estorno realizado ao cliente: 
    <strong>R$ ${Number(preview.totalEstornoCliente || 0).toFixed(2)}</strong><br>

    Impacto na comissão: 
    <strong>-R$ ${Math.abs(Number(preview.totalAjuste || 0)).toFixed(2)}</strong><br><br>

    Este valor será descontado <strong>neste fechamento</strong> para compensar
    uma comissão que já havia sido paga integralmente.
  </div>
`;
      }

      resumo.innerHTML = `
        <div><strong>Vendedor:</strong> ${vendedorSelecionado.nome}</div>
        ${alertaAjusteHtml}
        <div id="resumoLiquidoComissao" style="margin-top:10px"></div>
        <div class="muted">
          Nenhuma comissão nova pendente, porém o fechamento possui ajustes a serem aplicados.
        </div>
      `;
      atualizarResumoLiquidoComissao_();
      return;
    }

    // 🔔 ALERTA VISUAL — AJUSTE DE COMISSÃO PENDENTE
    const existeAjuste =
      preview.existeAjustePendentes === true ||
      (Array.isArray(preview.ajustesPendentes) && preview.ajustesPendentes.length > 0) ||
      (typeof preview.totalAjuste === 'number' && preview.totalAjuste !== 0);

    let alertaAjusteHtml = '';
    if (existeAjuste) {
      alertaAjusteHtml = `
  <div style="
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    background:#7c2d12;
    color:#fed7aa;
    font-size:13px;
  ">
    ⚠️ <strong>Ajuste de comissão por estorno</strong><br><br>

    Estorno realizado ao cliente: 
    <strong>R$ ${Number(preview.totalEstornoCliente || 0).toFixed(2)}</strong><br>

    Débito de comissão correspondente: 
    <strong>-R$ ${Math.abs(Number(preview.totalAjuste || 0)).toFixed(2)}</strong><br><br>

    Este valor será descontado <strong>neste fechamento</strong> para compensar
    uma comissão que já havia sido paga integralmente.
  </div>
`;
    }

    // 4️⃣ Render normal
    const totalFinal = Number(preview.totalComissao || 0) + Number(preview.totalAjuste || 0);
    let html = `
      <div><strong>Vendedor:</strong> ${vendedorSelecionado.nome}</div>
      ${alertaAjusteHtml}
      <div><strong>Eventos no fechamento:</strong> ${preview.totalEventos}</div>
      <div><strong>Total de comissão a pagar:</strong> R$ ${totalFinal.toFixed(2)}</div>
      <div id="resumoLiquidoComissao" style="margin-top:8px"></div>
      <div class="divider"></div>
      <div><strong>Detalhamento das Comissões (origem):</strong></div>
    `;
    if (preview.existeExcecao) {
      html += `
        <div style="margin-top:12px;padding:10px;border-radius:8px;
                    background:#7c2d12;color:#fed7aa;font-size:13px">
          ⚠️ Atenção: uma ou mais comissões não puderam ter a origem do
          recebimento validada automaticamente.<br>
          Revise antes de confirmar o fechamento.
        </div>
      `;
    }

    preview.eventos.forEach(ev => {
      const ajuste = Number(ev.ajusteComissao || 0);
      const temAjuste = ajuste !== 0;

      html += `

          <div class="muted">

          </div>

          </div>
          ${Number(ev.ajusteComissao || 0) !== 0 ? `
            <div style="margin-top:6px;color:#facc15;font-size:13px">
              ⚠️ Ajuste por estorno aplicado nesta comissão (-R$ ${Math.abs(ev.ajusteComissao).toFixed(2)})
            </div>
          ` : ``}
        </div>
      `;
    });

    html += `
