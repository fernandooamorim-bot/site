<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1a2e"/>
  <title>Abrindo calendário...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1a2e;
      color: #fff;
    }
    .box {
      width: min(520px, 92vw);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      padding: 18px;
      background: rgba(255,255,255,.06);
    }
    h1 { margin: 0 0 10px; font-size: 16px; }
    p { margin: 0; opacity: .86; font-size: 13px; line-height: 1.45; }
    .err { color: #fecaca; margin-top: 10px; }
    .actions {
      margin-top: 12px;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
    }
    .actions.show { display: flex; }
    .btn {
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: #fff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1 id="title">Abrindo calendário...</h1>
    <p id="msg">Aguarde um instante.</p>
    <p id="err" class="err" style="display:none"></p>
    <div id="actions" class="actions">
      <a id="btnIphone" class="btn" href="#">📱 Calendário iPhone</a>
      <a id="btnGoogle" class="btn" href="#">🗓️ Google Calendar</a>
    </div>
  </div>

  <script>
    function toDateOnlyIsoParts_(iso) {
      const str = String(iso || '').trim();
      const m = str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m) return { y: m[1], mo: m[2], d: m[3] };
      const c = str.match(/^(\d{4})(\d{2})(\d{2})$/);
      if (c) return { y: c[1], mo: c[2], d: c[3] };
      const b = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (b) return { y: b[3], mo: b[2], d: b[1] };
      return null;
    }

    function toHourParts_(str) {
      const raw = String(str || '').trim();
      const m1 = raw.match(/^(\d{1,2}):(\d{2})$/);
      if (m1) return { h: String(Number(m1[1])).padStart(2, '0'), m: String(Number(m1[2])).padStart(2, '0') };
      const m2 = raw.match(/^(\d{1,2})(\d{2})$/);
      if (m2) return { h: String(Number(m2[1])).padStart(2, '0'), m: String(Number(m2[2])).padStart(2, '0') };
      return null;
    }

    function buildDates_(dIso, hi, hf) {
      const p = toDateOnlyIsoParts_(dIso);
      if (!p) return '';
      const hh1 = toHourParts_(hi);
      const hh2 = toHourParts_(hf);
      if (hh1 && hh2) {
        const h1 = hh1.h;
        const m1 = hh1.m;
        const h2 = hh2.h;
        const m2 = hh2.m;
        return `${p.y}${p.mo}${p.d}T${h1}${m1}00/${p.y}${p.mo}${p.d}T${h2}${m2}00`;
      }
      const start = `${p.y}${p.mo}${p.d}`;
      const dt = new Date(Number(p.y), Number(p.mo) - 1, Number(p.d), 12, 0, 0, 0);
      dt.setDate(dt.getDate() + 1);
      const end = `${dt.getFullYear()}${String(dt.getMonth() + 1).padStart(2, '0')}${String(dt.getDate()).padStart(2, '0')}`;
      return `${start}/${end}`;
    }

    function isIOS_() {
      const ua = navigator.userAgent || '';
      return /iPhone|iPad|iPod/i.test(ua);
    }

    function isAndroid_() {
      const ua = navigator.userAgent || '';
      return /Android/i.test(ua);
    }

    function encodeIcsLikeSafari_(ics) {
      return String(ics || '')
        .replace(/\r\n/g, '\n')
        .replace(/\n/g, '%0A')
        .replace(/ /g, '%20');
    }

    function buildIcsDataUrl_(evt) {
      const p = toDateOnlyIsoParts_(evt.d);
      if (!p) return '';
      const title = String(evt.t || evt.e || 'Evento FA Produções');
      const locationTxt = String(evt.l || '');
      // Em iOS/Safari, payload menor tende a funcionar melhor do que descrição extensa.
      const notes = evt.e ? ('Ref: ' + String(evt.e)) : '';
      const hh1 = toHourParts_(evt.hi || evt.s);
      const hh2 = toHourParts_(evt.hf || evt.f);

      const dtStamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\\.\\d{3}Z$/, 'Z');
      let dtStart = '';
      let dtEnd = '';
      if (hh1 && hh2) {
        dtStart = `${p.y}${p.mo}${p.d}T${hh1.h}${hh1.m}00`;
        dtEnd = `${p.y}${p.mo}${p.d}T${hh2.h}${hh2.m}00`;
      } else {
        const start = `${p.y}${p.mo}${p.d}`;
        const d = new Date(Number(p.y), Number(p.mo) - 1, Number(p.d), 12, 0, 0, 0);
        d.setDate(d.getDate() + 1);
        const end = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
        dtStart = `${start}T090000`;
        dtEnd = `${end}T090000`;
      }

      const reminderMinutes = Number(evt.r || 180);
      const trigger = reminderMinutes > 0 ? `-PT${Math.max(1, Math.floor(reminderMinutes))}M` : '-PT180M';
      const uid = String(evt.e || ('evt-' + p.y + p.mo + p.d)).replace(/[^a-zA-Z0-9_-]/g, '');
      const ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//FA Producoes//Agenda//PT-BR',
        'BEGIN:VEVENT',
        'UID:' + uid,
        'DTSTAMP:' + dtStamp,
        'DTSTART:' + dtStart,
        'DTEND:' + dtEnd,
        'SUMMARY:' + title,
        locationTxt ? ('LOCATION:' + locationTxt) : '',
        notes ? ('DESCRIPTION:' + notes) : '',
        'BEGIN:VALARM',
        'TRIGGER:' + trigger,
        'ACTION:DISPLAY',
        'DESCRIPTION:Lembrete do evento',
        'END:VALARM',
        'END:VEVENT',
        'END:VCALENDAR'
      ].filter(Boolean).join('\\n');
      return 'data:text/calendar;charset=utf-8,' + encodeIcsLikeSafari_(ics);
    }

    function mostrarAcoes_(urlIphone, urlGoogle) {
      const actions = document.getElementById('actions');
      const btnIphone = document.getElementById('btnIphone');
      const btnGoogle = document.getElementById('btnGoogle');
      const titleEl = document.getElementById('title');
      const msgEl = document.getElementById('msg');
      if (btnIphone) btnIphone.href = urlIphone || '#';
      if (btnGoogle) btnGoogle.href = urlGoogle || '#';
      if (actions) actions.classList.add('show');
      if (titleEl) titleEl.textContent = 'Escolha onde adicionar';
      if (msgEl) msgEl.textContent = 'Se não abrir automaticamente, escolha uma opção abaixo.';
    }

    function redirect_() {
      try {
        const token = String((location.hash || '').replace(/^#/, '')).trim();
        if (!token) throw new Error('Link inválido.');

        let b64 = token.replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4 !== 0) b64 += '=';
        const json = atob(b64);
        const data = JSON.parse(json);
        if (!data || typeof data !== 'object') throw new Error('Link inválido.');
        if (data.exp && Number(data.exp) < Date.now()) throw new Error('Este link expirou.');

        const title = String(data.t || data.e || 'Evento FA Produções').trim();
        const detailsParts = [];
        if (data.o) detailsParts.push('Obs: ' + String(data.o));
        if (data.m) detailsParts.push('Maps: ' + String(data.m));
        if (data.e) detailsParts.push('Ref: ' + String(data.e));
        const details = detailsParts.join('\n');
        const locationTxt = String(data.l || '').trim();
        const ctz = String(data.ctz || 'America/Fortaleza').trim();
        const reminderMinutes = Number(data.r || 0);
        const dates = buildDates_(data.d, data.hi || data.s, data.hf || data.f);
        if (!dates) throw new Error('Dados de data/hora inválidos.');

        const urlWeb = 'https://calendar.google.com/calendar/render?action=TEMPLATE'
          + '&text=' + encodeURIComponent(title)
          + '&dates=' + encodeURIComponent(dates)
          + '&details=' + encodeURIComponent(details)
          + '&location=' + encodeURIComponent(locationTxt)
          + '&ctz=' + encodeURIComponent(ctz)
          + (reminderMinutes > 0 ? ('&reminders=' + encodeURIComponent(String(reminderMinutes))) : '');
        const urlIphone = buildIcsDataUrl_(data);

        if (isIOS_()) {
          const titleEl = document.getElementById('title');
          const msgEl = document.getElementById('msg');
          if (titleEl) titleEl.textContent = 'Abrindo Calendário do iPhone...';
          if (msgEl) msgEl.textContent = 'Aguarde um instante.';
          if (urlIphone) {
            // Mostra opção manual imediatamente, caso o iOS bloqueie abertura automática.
            mostrarAcoes_(urlIphone, urlWeb);
            const fallbackManual = setTimeout(() => {
              mostrarAcoes_(urlIphone, urlWeb);
            }, 1200);
            window.addEventListener('pagehide', () => clearTimeout(fallbackManual), { once: true });
            window.addEventListener('blur', () => clearTimeout(fallbackManual), { once: true });
            location.href = urlIphone;
            return;
          }
          mostrarAcoes_(urlIphone, urlWeb);
          return;
        }

        if (isAndroid_()) {
          const titleEl = document.getElementById('title');
          const msgEl = document.getElementById('msg');
          if (titleEl) titleEl.textContent = 'Abrindo Google Calendar...';
          if (msgEl) msgEl.textContent = 'Aguarde um instante.';
          location.replace(urlWeb);
          return;
        }

        mostrarAcoes_(urlIphone, urlWeb);
      } catch (err) {
        const msg = document.getElementById('msg');
        const errEl = document.getElementById('err');
        if (msg) msg.textContent = 'Não foi possível abrir automaticamente.';
        if (errEl) {
          errEl.style.display = 'block';
          errEl.textContent = String(err && err.message ? err.message : err);
        }
      }
    }

    redirect_();
  </script>
</body>
</html>
