<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Configurações • ACL</title>
  <script src="auth.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #fff;
      --line: #dbe2ef;
      --text: #0f172a;
      --muted: #64748b;
      --navy: #0f1a2e;
      --gold: #e0bc6a;
      --shadow: 0 8px 20px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .topbar {
      position: sticky; top: 0; z-index: 30; background: var(--navy); color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.08); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; }
    .back { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; background: rgba(224,188,106,.14); }
    .back i { width: 18px; height: 18px; color: var(--gold); }
    .title { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 18px; }
    .title i { width: 18px; height: 18px; color: var(--gold); }
    .page { max-width: 1240px; margin: 0 auto; padding: 14px; display: grid; gap: 12px; }
    .card { border: 1px solid var(--line); border-radius: 14px; background: var(--card); box-shadow: var(--shadow); padding: 14px; }
    .muted { color: var(--muted); font-size: 13px; }
    .kpis { display: grid; gap: 10px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .kpi { border: 1px solid var(--line); border-radius: 12px; background: #fff; padding: 12px; }
    .kpi .label { font-size: 12px; color: var(--muted); }
    .kpi .value { font-size: 20px; font-weight: 800; margin-top: 6px; }
    .list { display: grid; gap: 8px; max-height: 220px; overflow: auto; margin-top: 10px; }
    .item { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #fff; display: grid; gap: 4px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .name { font-size: 13px; font-weight: 700; }
    .pill { font-size: 11px; font-weight: 700; border-radius: 999px; padding: 3px 8px; border: 1px solid var(--line); }
    .pill.ok { color: #166534; background: #ecfdf3; border-color: #bbf7d0; }
    .pill.off { color: #9a3412; background: #fff7ed; border-color: #fed7aa; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 780px; }
    th, td { border-bottom: 1px solid #eef2f8; text-align: left; padding: 10px; vertical-align: top; }
    thead th { background: #f8fafc; font-size: 11px; letter-spacing: .02em; text-transform: uppercase; color: #475569; }
    .tag { display: inline-block; font-size: 11px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 999px; padding: 2px 7px; margin: 1px 4px 1px 0; }
    .error { color: #b91c1c; font-weight: 600; font-size: 13px; }
    @media (max-width: 900px) {
      .kpis { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand" onclick="window.location.href='configuracoes.html'">
      <div class="back"><i data-lucide="arrow-left"></i></div>
      <div class="title"><i data-lucide="shield-check"></i><span>Permissões (ACL) • Somente Leitura</span></div>
    </div>
  </header>

  <main class="page">
    <section class="card">
      <div class="muted">Visão de auditoria de perfis, regras efetivas e usuários ativos/inativos. Não há edição nesta fase.</div>
      <div id="status" class="muted" style="margin-top:8px">Carregando...</div>
    </section>

    <section class="kpis">
      <article class="kpi">
        <div class="label">Usuários mapeados</div>
        <div class="value" id="kpiUsuarios">-</div>
      </article>
      <article class="kpi">
        <div class="label">Perfis com ACL</div>
        <div class="value" id="kpiPerfis">-</div>
      </article>
      <article class="kpi">
        <div class="label">Ações catalogadas</div>
        <div class="value" id="kpiAcoes">-</div>
      </article>
    </section>

    <section class="card">
      <div class="row">
        <h3 style="margin:0;font-size:15px">Usuários e Permissões Efetivas</h3>
      </div>
      <div id="usuariosList" class="list"></div>
    </section>

    <section class="card">
      <h3 style="margin:0;font-size:15px">Matriz por Perfil</h3>
      <div id="tabelaPerfil" class="table-wrap"></div>
    </section>
  </main>

  <script>
    function normalizarPerfil(perfil) {
      return String(perfil || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toLowerCase();
    }

    function escapeHtml(v) {
      return String(v || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setStatus(msg, isError) {
      const el = document.getElementById('status');
      if (!el) return;
      el.textContent = msg || '';
      el.className = isError ? 'error' : 'muted';
    }

    function renderUsuarios(usuarios) {
      const box = document.getElementById('usuariosList');
      if (!box) return;
      if (!usuarios.length) {
        box.innerHTML = '<div class="muted">Nenhum usuário encontrado.</div>';
        return;
      }
      box.innerHTML = usuarios.map(u => {
        const ativo = String(u.status || '').trim().toUpperCase() === 'ATIVO';
        const regras = Array.isArray(u.regras) ? u.regras : [];
        const regrasHtml = regras.length
          ? regras.map(r => `<span class="tag">${escapeHtml(r)}</span>`).join('')
          : '<span class="muted">Sem regras</span>';
        return `
          <article class="item">
            <div class="row">
              <div class="name">${escapeHtml(u.nome || u.email || '(Sem nome)')}</div>
              <span class="pill ${ativo ? 'ok' : 'off'}">${ativo ? 'ATIVO' : 'INATIVO'}</span>
            </div>
            <div class="muted">${escapeHtml(u.email || '-')} • Perfil: ${escapeHtml(u.perfil || '-')}</div>
            <div>${regrasHtml}</div>
          </article>
        `;
      }).join('');
    }

    function renderPerfis(perfisAcl) {
      const box = document.getElementById('tabelaPerfil');
      if (!box) return;
      const perfis = Object.keys(perfisAcl || {});
      if (!perfis.length) {
        box.innerHTML = '<div class="muted" style="padding:10px">Sem perfis ACL.</div>';
        return;
      }
      const linhas = perfis.map(perfil => {
        const regras = Array.isArray(perfisAcl[perfil]) ? perfisAcl[perfil] : [];
        const regrasHtml = regras.length
          ? regras.map(r => `<span class="tag">${escapeHtml(r)}</span>`).join('')
          : '-';
        return `
          <tr>
            <td><strong>${escapeHtml(perfil)}</strong></td>
            <td>${regrasHtml}</td>
          </tr>
        `;
      }).join('');
      box.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Perfil</th>
              <th>Regras</th>
            </tr>
          </thead>
          <tbody>${linhas}</tbody>
        </table>
      `;
    }

    async function init() {
      try {
        const auth = await Auth.apiCall('verificarUsuario');
        if (!auth || !auth.ok || !auth.user) throw new Error('NOT_AUTH');
        if (normalizarPerfil(auth.user.perfil) !== 'proprietario') {
          alert('Apenas o proprietário pode acessar esta tela.');
          window.location.href = 'configuracoes.html';
          return;
        }

        const resp = await Auth.apiCall('listarAclReadOnly');
        if (!resp || resp.ok === false) {
          throw new Error(resp?.mensagem || 'Falha ao carregar ACL');
        }
        const usuarios = Array.isArray(resp.usuarios) ? resp.usuarios : [];
        const perfisAcl = resp.perfisAcl || {};
        const acoesCatalogo = Array.isArray(resp.acoesCatalogo) ? resp.acoesCatalogo : [];

        document.getElementById('kpiUsuarios').textContent = String(usuarios.length);
        document.getElementById('kpiPerfis').textContent = String(Object.keys(perfisAcl).length);
        document.getElementById('kpiAcoes').textContent = String(acoesCatalogo.length);

        renderUsuarios(usuarios);
        renderPerfis(perfisAcl);
        setStatus('Leitura carregada com sucesso.');
      } catch (err) {
        console.error('Erro ACL read-only:', err);
        setStatus('Erro ao carregar ACL: ' + String(err && err.message ? err.message : err), true);
      } finally {
        if (window.lucide) window.lucide.createIcons();
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
