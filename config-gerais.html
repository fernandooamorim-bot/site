<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Configurações • Gerais (Read-only)</title>
  <script src="auth.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #fff;
      --line: #dbe2ef;
      --text: #0f172a;
      --muted: #64748b;
      --navy: #0f1a2e;
      --gold: #e0bc6a;
      --shadow: 0 8px 20px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .topbar {
      position: sticky; top: 0; z-index: 30; background: var(--navy); color: #fff;
      border-bottom: 1px solid rgba(255,255,255,.08); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; }
    .back { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; background: rgba(224,188,106,.14); }
    .back i { width: 18px; height: 18px; color: var(--gold); }
    .title { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 18px; }
    .title i { width: 18px; height: 18px; color: var(--gold); }
    .page { max-width: 1280px; margin: 0 auto; padding: 14px; display: grid; gap: 12px; }
    .card { border: 1px solid var(--line); border-radius: 14px; background: var(--card); box-shadow: var(--shadow); padding: 14px; }
    .muted { color: var(--muted); font-size: 13px; }
    .kpis { display: grid; gap: 10px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .kpi { border: 1px solid var(--line); border-radius: 12px; background: #fff; padding: 12px; }
    .kpi .label { font-size: 12px; color: var(--muted); }
    .kpi .value { font-size: 20px; font-weight: 800; margin-top: 6px; }
    .filters { display: grid; gap: 10px; grid-template-columns: 240px minmax(0, 1fr); margin-top: 10px; }
    .input, .select {
      border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
      font-size: 13px; background: #fff; color: #0f172a;
    }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 880px; }
    th, td { border-bottom: 1px solid #eef2f8; text-align: left; padding: 10px; vertical-align: top; }
    thead th { background: #f8fafc; font-size: 11px; letter-spacing: .02em; text-transform: uppercase; color: #475569; }
    .tag { display: inline-block; font-size: 11px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 999px; padding: 2px 7px; }
    .error { color: #b91c1c; font-weight: 600; font-size: 13px; }
    @media (max-width: 900px) {
      .kpis { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand" onclick="window.location.href='configuracoes.html'">
      <div class="back"><i data-lucide="arrow-left"></i></div>
      <div class="title"><i data-lucide="sliders-horizontal"></i><span>Configurações Gerais • Somente Leitura</span></div>
    </div>
  </header>

  <main class="page">
    <section class="card">
      <div class="muted">Catálogo de chaves da aba CONFIG com categorização automática e tipagem inferida. Sem edição nesta fase.</div>
      <div id="status" class="muted" style="margin-top:8px">Carregando...</div>
    </section>

    <section class="kpis">
      <article class="kpi">
        <div class="label">Total de chaves</div>
        <div class="value" id="kpiTotal">-</div>
      </article>
      <article class="kpi">
        <div class="label">Categorias</div>
        <div class="value" id="kpiCategorias">-</div>
      </article>
      <article class="kpi">
        <div class="label">Visão atual</div>
        <div class="value" id="kpiVisao">-</div>
      </article>
    </section>

    <section class="card">
      <h3 style="margin:0;font-size:15px">Catálogo de Chaves</h3>
      <div class="filters">
        <select id="fCategoria" class="select"></select>
        <input id="fBusca" class="input" type="text" placeholder="Buscar por chave, descrição ou valor...">
      </div>
      <div id="tabela" class="table-wrap"></div>
    </section>
  </main>

  <script>
    let itens = [];

    function normalizarPerfil(perfil) {
      return String(perfil || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toLowerCase();
    }

    function escapeHtml(v) {
      return String(v || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setStatus(msg, isError) {
      const el = document.getElementById('status');
      if (!el) return;
      el.textContent = msg || '';
      el.className = isError ? 'error' : 'muted';
    }

    function valorParaTexto(v) {
      if (v === null || typeof v === 'undefined') return '';
      if (Object.prototype.toString.call(v) === '[object Date]') {
        return new Date(v).toLocaleString('pt-BR');
      }
      return String(v);
    }

    function popularCategorias() {
      const select = document.getElementById('fCategoria');
      if (!select) return;
      const cats = Array.from(new Set(itens.map(x => String(x.categoria || 'GERAL')))).sort((a, b) => a.localeCompare(b, 'pt-BR'));
      select.innerHTML = '<option value="">Todas as categorias</option>' + cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
      document.getElementById('kpiCategorias').textContent = String(cats.length);
    }

    function getFiltrados() {
      const cat = String(document.getElementById('fCategoria')?.value || '').trim();
      const busca = String(document.getElementById('fBusca')?.value || '').trim().toLowerCase();
      return itens.filter(x => {
        if (cat && String(x.categoria || '') !== cat) return false;
        if (!busca) return true;
        const blob = [
          x.chave,
          x.descricao,
          valorParaTexto(x.valor),
          x.categoria,
          x.tipoValor
        ].join(' ').toLowerCase();
        return blob.indexOf(busca) >= 0;
      });
    }

    function renderTabela() {
      const box = document.getElementById('tabela');
      if (!box) return;
      const lista = getFiltrados();
      document.getElementById('kpiVisao').textContent = String(lista.length);
      if (!lista.length) {
        box.innerHTML = '<div class="muted" style="padding:10px">Nenhum item encontrado.</div>';
        return;
      }
      const linhas = lista.map(item => `
        <tr>
          <td><strong>${escapeHtml(item.chave || '')}</strong></td>
          <td><span class="tag">${escapeHtml(item.categoria || 'GERAL')}</span></td>
          <td><span class="tag">${escapeHtml(item.tipoValor || '-')}</span></td>
          <td>${escapeHtml(valorParaTexto(item.valor))}</td>
          <td>${escapeHtml(item.descricao || '')}</td>
        </tr>
      `).join('');
      box.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Chave</th>
              <th>Categoria</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Descrição</th>
            </tr>
          </thead>
          <tbody>${linhas}</tbody>
        </table>
      `;
    }

    async function init() {
      try {
        const auth = await Auth.apiCall('verificarUsuario');
        if (!auth || !auth.ok || !auth.user) throw new Error('NOT_AUTH');
        if (normalizarPerfil(auth.user.perfil) !== 'proprietario') {
          alert('Apenas o proprietário pode acessar esta tela.');
          window.location.href = 'configuracoes.html';
          return;
        }

        const resp = await Auth.apiCall('listarConfigCatalogReadOnly');
        if (!resp || resp.ok === false) {
          throw new Error(resp?.mensagem || 'Falha ao carregar catálogo de configurações');
        }

        itens = Array.isArray(resp.itens) ? resp.itens : [];
        document.getElementById('kpiTotal').textContent = String(itens.length);
        popularCategorias();
        renderTabela();
        setStatus('Catálogo carregado com sucesso.');

        document.getElementById('fCategoria')?.addEventListener('change', renderTabela);
        document.getElementById('fBusca')?.addEventListener('input', renderTabela);
      } catch (err) {
        console.error('Erro config read-only:', err);
        setStatus('Erro ao carregar configurações: ' + String(err && err.message ? err.message : err), true);
      } finally {
        if (window.lucide) window.lucide.createIcons();
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
