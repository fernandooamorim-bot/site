<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1a2e"/>
  <meta name="application-name" content="Sistema Super Agenda"/>
  <meta name="apple-mobile-web-app-title" content="Super Agenda"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="msapplication-TileColor" content="#0f1a2e"/>
  <link rel="manifest" href="site.webmanifest"/>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48.png"/>
  <link rel="icon" type="image/png" sizes="96x96" href="img/favicon-96x96.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png"/>
  <title>Gerador de Propostas PDF</title>

  <script src="auth.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --navy-800: #0f1a2e;
      --navy-600: #1e3a5f;
      --gold-400: #e0bc6a;
      --gray-50: #f8f9fc;
      --gray-100: #eef2f8;
      --gray-200: #d9e0ed;
      --gray-700: #374151;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --nav-height: 68px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--gray-50);
      color: #111827;
      padding-bottom: 0;
    }

    .global-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy-800);
      color: #fff;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: var(--nav-height);
    }

    .global-header-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }

    .global-header-back {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(212,168,83,0.10);
    }

    .global-header-back i { width: 18px; height: 18px; color: var(--gold-400); }

    .global-header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #ffffff;
    }

    .global-header-title i { width: 20px; height: 20px; color: var(--gold-400); }

    .global-header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .global-header-user {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px 4px 4px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
    }

    .global-header-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--navy-600), rgba(58,96,152,0.8));
      color: var(--gold-400);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .global-header-name {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .global-header-logout {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .global-header-logout i,
    .global-header-logout svg {
      width: 18px;
      height: 18px;
      color: rgba(255,255,255,0.95);
      stroke: currentColor;
    }

    .page {
      padding: 14px;
      max-width: 1280px;
      margin: 0 auto;
      min-height: calc(100vh - var(--nav-height));
    }

    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(10,22,40,0.08);
      overflow: hidden;
    }

    .card-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      color: #0f172a;
      font-size: 14px;
    }

    .card-title i { width: 16px; height: 16px; color: #1e3a5f; }

    .card-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .status {
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }

    .status.show { display: block; }
    .status.info { background: #eff6ff; color: #1e3a8a; border: 1px solid #bfdbfe; }
    .status.ok { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.span-2 { grid-column: span 2; }

    .field label {
      font-size: 12px;
      color: #334155;
      font-weight: 700;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid #d6deea;
      border-radius: 10px;
      background: #fff;
      padding: 10px 11px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: #1e3a5f;
      box-shadow: 0 0 0 3px rgba(30,58,95,0.12);
    }

    .field textarea {
      min-height: 86px;
      resize: vertical;
    }

    .options {
      border: 1px solid #d6deea;
      border-radius: 10px;
      background: #fbfcff;
      padding: 10px 11px;
      display: grid;
      gap: 8px;
    }

    .opt-line {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .opt-line input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #1e3a5f;
    }

    .opt-line span {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      min-width: 80px;
    }

    .opt-line input[type="text"] {
      width: 170px;
      padding: 7px 9px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid #d6deea;
      background: #fff;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--gray-200);
      background: #fff;
      color: #0f172a;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn.primary {
      background: #1e3a5f;
      color: #fff;
      border-color: #1e3a5f;
    }

    .btn[disabled] {
      opacity: 0.6;
      cursor: wait;
    }

    .result-box {
      border: 1px solid #d6deea;
      border-radius: 10px;
      background: #f8fafc;
      padding: 10px;
      display: none;
      gap: 8px;
    }

    .result-box.show {
      display: grid;
    }

    .result-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .result-row strong {
      color: #0f172a;
      min-width: 140px;
    }

    .result-row a {
      color: #1d4ed8;
      text-decoration: none;
      word-break: break-all;
    }

    .result-actions {
      display: inline-flex;
      gap: 6px;
      margin-left: auto;
    }

    .icon-btn {
      border: 1px solid #d6deea;
      background: #fff;
      border-radius: 8px;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #334155;
    }

    .icon-btn i,
    .icon-btn svg {
      width: 15px;
      height: 15px;
      color: currentColor;
      stroke: currentColor;
    }

    .proc-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.55);
      backdrop-filter: blur(2px);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .proc-overlay.show { display: flex; }

    .proc-card {
      width: min(420px, 100%);
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 14px 48px rgba(10,22,40,0.35);
      border: 1px solid #d9e0ed;
      padding: 18px;
      display: grid;
      gap: 8px;
      text-align: center;
    }

    .proc-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #dbe7fb;
      border-top-color: #1e3a5f;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.9s linear infinite;
    }

    .proc-title {
      font-size: 15px;
      font-weight: 800;
      color: #0f172a;
    }

    .proc-sub {
      font-size: 13px;
      color: #334155;
      min-height: 20px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(var(--nav-height) + env(safe-area-inset-bottom) + 10px);
      background: var(--navy-800);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 200;
      display: none;
      align-items: flex-start;
      justify-content: space-evenly;
      padding: 0 8px calc(env(safe-area-inset-bottom) + 16px);
      border-radius: 0;
    }

    .bnav-item {
      border: 0;
      background: transparent;
      color: rgba(255,255,255,0.9);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 2px 10px 8px;
      min-height: 54px;
      min-width: 62px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .bnav-item i {
      width: 20px;
      height: 20px;
      color: currentColor;
      stroke: currentColor;
      fill: none;
    }

    .bnav-item.active {
      color: var(--gold-400);
      background: rgba(212,168,83,0.08);
    }

    @media (max-width: 767px) {
      body { padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 12px); }
      .bottom-nav { display: flex; }
      .page {
        padding: 10px;
        min-height: auto;
      }
      .global-header-title span {
        max-width: 145px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .form-grid { grid-template-columns: 1fr; }
      .field.span-2 { grid-column: span 1; }
      .result-row strong { min-width: auto; }
      .opt-line input[type="text"] { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="global-header">
    <a class="global-header-brand" onclick="window.location.href='index.html'" title="Voltar ao Início">
      <div class="global-header-back">
        <i data-lucide="arrow-left"></i>
      </div>
      <div class="global-header-title">
        <i data-lucide="file-text"></i>
        <span>Gerador de Propostas PDF</span>
      </div>
    </a>

    <div class="global-header-actions">
      <div class="global-header-user">
        <div class="global-header-avatar" id="ghAvatar">--</div>
        <div class="global-header-name" id="ghName"></div>
      </div>
      <button class="global-header-logout" onclick="Auth.logout()" title="Sair">
        <i data-lucide="log-out"></i>
      </button>
    </div>
  </div>

  <main class="page">
    <section class="card">
      <div class="card-head">
        <div class="card-title">
          <i data-lucide="file-text"></i>
          Gerador automático de propostas em PDF personalizado
        </div>
      </div>
      <div class="card-body">
        <div class="status show info" id="statusMsg">Preencha os dados e clique em "Gerar orçamento".</div>

        <div class="form-grid">
          <div class="field">
            <label for="nome">Nome do contratante</label>
            <input id="nome" type="text" placeholder="Ex.: Maria Fernanda">
          </div>
          <div class="field">
            <label for="telefone">Telefone (WhatsApp)</label>
            <input id="telefone" type="text" inputmode="numeric" autocomplete="tel" maxlength="16" placeholder="Ex.: (85) 99999-9999">
          </div>
          <div class="field">
            <label for="dataEvento">Data do evento</label>
            <input id="dataEvento" type="date">
          </div>
          <div class="field span-2">
            <label>Propostas e valores</label>
            <div class="options">
              <div class="opt-line">
                <input id="propPocket" type="checkbox">
                <span>Pocket</span>
                <input id="valorPocket" type="text" inputmode="decimal" placeholder="Valor (opcional)">
              </div>
              <div class="opt-line">
                <input id="propGold" type="checkbox">
                <span>Gold</span>
                <input id="valorGold" type="text" inputmode="decimal" placeholder="Valor (opcional)">
              </div>
              <div class="opt-line">
                <input id="propPremium" type="checkbox">
                <span>Premium</span>
                <input id="valorPremium" type="text" inputmode="decimal" placeholder="Valor (opcional)">
              </div>
            </div>
          </div>
          <div class="field span-2">
            <label for="observacoes">Observações (opcional)</label>
            <textarea id="observacoes" placeholder="Detalhes adicionais para contexto interno."></textarea>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" id="btnGerar">
            <i data-lucide="sparkles"></i>
            Gerar orçamento
          </button>
          <button class="btn" id="btnLimpar">
            <i data-lucide="eraser"></i>
            Limpar
          </button>
        </div>

        <div class="result-box" id="resultBox">
          <div class="result-row"><strong>Número:</strong><span id="resNumero">-</span></div>
          <div class="result-row">
            <strong>PDF:</strong>
            <a id="resPdf" href="#" target="_blank" rel="noopener noreferrer">Abrir PDF</a>
            <div class="result-actions">
              <button class="icon-btn" id="btnOpenPdf" title="Abrir">
                <i data-lucide="external-link"></i>
              </button>
              <button class="icon-btn" id="btnCopyPdf" title="Copiar link PDF">
                <i data-lucide="copy"></i>
              </button>
            </div>
          </div>
          <div class="result-row">
            <strong>WhatsApp:</strong>
            <a id="resWhats" href="#" target="_blank" rel="noopener noreferrer">Abrir mensagem</a>
            <div class="result-actions">
              <button class="icon-btn" id="btnOpenWhats" title="Abrir">
                <i data-lucide="external-link"></i>
              </button>
              <button class="icon-btn" id="btnCopyWhats" title="Copiar link WhatsApp">
                <i data-lucide="copy"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="bnav-item" onclick="window.location.href='index.html'">
      <i data-lucide="layout-grid"></i>
      <span>Início</span>
    </button>
    <button class="bnav-item" onclick="window.location.href='agenda.html'">
      <i data-lucide="calendar-days"></i>
      <span>Agenda</span>
    </button>
    <button class="bnav-item" onclick="window.location.href='cadastro-evento.html'">
      <i data-lucide="plus-circle"></i>
      <span>Novo</span>
    </button>
    <button class="bnav-item" onclick="window.location.href='central-financeira.html'">
      <i data-lucide="landmark"></i>
      <span>Financeiro</span>
    </button>
    <button class="bnav-item active">
      <i data-lucide="file-text"></i>
      <span>Propostas</span>
    </button>
  </nav>

  <div class="proc-overlay" id="procOverlay" aria-hidden="true">
    <div class="proc-card">
      <div class="proc-spinner"></div>
      <div class="proc-title">Processando orçamento</div>
      <div class="proc-sub" id="procSub">Aguarde alguns instantes...</div>
    </div>
  </div>

  <script>
    let processingInterval_ = null;

    function normalizarPerfil(perfil) {
      return String(perfil || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toLowerCase();
    }

    function isPerfilLiberado(perfil) {
      const p = normalizarPerfil(perfil);
      return p === 'proprietario' || p === 'administrador' || p === 'admin' || p === 'socio';
    }

    function preencherHeaderLocal_() {
      const nome = String(localStorage.getItem('auth_nome') || '').trim();
      if (!nome) return;
      const partes = nome.split(' ').filter(Boolean);
      const first = partes[0] || nome;
      const iniciais = partes.length >= 2
        ? (partes[0][0] + partes[partes.length - 1][0]).toUpperCase()
        : (nome.slice(0, 2).toUpperCase() || 'US');
      const avatar = document.getElementById('ghAvatar');
      const ghName = document.getElementById('ghName');
      if (avatar) avatar.textContent = iniciais;
      if (ghName) ghName.textContent = first;
    }

    function setStatus_(msg, tipo) {
      const el = document.getElementById('statusMsg');
      if (!el) return;
      el.textContent = String(msg || '');
      el.className = 'status show ' + (tipo || 'info');
    }

    function normalizarNumero_(raw) {
      const str = String(raw || '').trim();
      if (!str) return '';
      const somente = str
        .replace(/\s+/g, '')
        .replace(/[Rr]\$/g, '')
        .replace(/[^0-9.,]/g, '')
        .replace(/\./g, '')
        .replace(',', '.');
      if (!somente) return '';
      const n = Number(somente);
      return isNaN(n) ? '' : String(n);
    }

    function apenasDigitos_(v) {
      return String(v || '').replace(/\D/g, '');
    }

    function formatarTelefoneMascara_(v) {
      const d = apenasDigitos_(v).slice(0, 11);
      if (d.length <= 2) return d ? `(${d}` : '';
      if (d.length <= 6) return `(${d.slice(0,2)}) ${d.slice(2)}`;
      if (d.length <= 10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
      return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
    }

    function formatarValorVisual_(v) {
      const limpo = String(v || '')
        .replace(/[^\d.,]/g, '')
        .replace(/\./g, '')
        .replace(',', '.');
      if (!limpo) return '';
      const n = Number(limpo);
      if (isNaN(n)) return '';
      return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function coletarPayload_() {
      const propostas = [];
      if (document.getElementById('propPocket').checked) propostas.push('pocket');
      if (document.getElementById('propGold').checked) propostas.push('gold');
      if (document.getElementById('propPremium').checked) propostas.push('premium');

      return {
        nome: document.getElementById('nome').value.trim(),
        telefone: document.getElementById('telefone').value.trim(),
        dataEvento: document.getElementById('dataEvento').value,
        propostas: propostas.join(','),
        valorPocket: normalizarNumero_(document.getElementById('valorPocket').value),
        valorGold: normalizarNumero_(document.getElementById('valorGold').value),
        valorPremium: normalizarNumero_(document.getElementById('valorPremium').value),
        observacoes: document.getElementById('observacoes').value.trim()
      };
    }

    function validarPayload_(p) {
      if (!p.nome) return 'Informe o nome do contratante.';
      if (!p.telefone) return 'Informe o telefone.';
      if (apenasDigitos_(p.telefone).length < 10) return 'Telefone inválido.';
      if (!p.dataEvento) return 'Informe a data do evento.';
      if (!p.propostas) return 'Selecione ao menos uma proposta.';
      return '';
    }

    function setProcessing_(on, etapa) {
      const overlay = document.getElementById('procOverlay');
      const sub = document.getElementById('procSub');
      const btnGerar = document.getElementById('btnGerar');
      const btnLimpar = document.getElementById('btnLimpar');
      if (sub && etapa) sub.textContent = etapa;
      if (overlay) overlay.classList.toggle('show', !!on);
      if (btnGerar) btnGerar.disabled = !!on;
      if (btnLimpar) btnLimpar.disabled = !!on;
      if (!on && processingInterval_) {
        clearInterval(processingInterval_);
        processingInterval_ = null;
      }
    }

    function iniciarFasesProcessing_() {
      const sub = document.getElementById('procSub');
      if (!sub) return;
      const fases = [
        'Validando dados do orçamento...',
        'Processando proposta e valores...',
        'Gerando PDF no Drive...',
        'Montando link do WhatsApp...',
        'Finalizando envio...'
      ];
      let idx = 0;
      sub.textContent = fases[0];
      if (processingInterval_) clearInterval(processingInterval_);
      processingInterval_ = setInterval(function() {
        if (idx < fases.length - 1) {
          idx += 1;
          sub.textContent = fases[idx];
          return;
        }
        // Após chegar na última fase, mantém mensagem estável sem reiniciar ciclo.
        sub.textContent = 'Finalizando envio... Aguarde mais um instante.';
      }, 2800);
    }

    function estaStandaloneIOS_() {
      return typeof navigator !== 'undefined' && navigator.standalone === true;
    }

    function abrirLinkExterno_(url) {
      const target = String(url || '').trim();
      if (!target) return;
      try {
        if (estaStandaloneIOS_()) {
          window.open(target, '_blank', 'noopener,noreferrer');
          return;
        }
        window.open(target, '_blank', 'noopener,noreferrer');
      } catch (_) {
        window.location.href = target;
      }
    }

    async function copiarTexto_(texto, okMsg) {
      const t = String(texto || '').trim();
      if (!t) {
        setStatus_('Link indisponível para copiar.', 'err');
        return;
      }
      try {
        await navigator.clipboard.writeText(t);
        setStatus_(okMsg || 'Link copiado.', 'ok');
      } catch (_) {
        setStatus_('Não foi possível copiar automaticamente.', 'err');
      }
    }

    function limparFormulario_() {
      ['nome', 'telefone', 'dataEvento', 'valorPocket', 'valorGold', 'valorPremium', 'observacoes']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      ['propPocket', 'propGold', 'propPremium']
        .forEach(id => { const el = document.getElementById(id); if (el) el.checked = false; });
      const result = document.getElementById('resultBox');
      if (result) result.classList.remove('show');
      setStatus_('Formulário limpo.', 'info');
    }

    function renderResultado_(resp) {
      const box = document.getElementById('resultBox');
      if (!box) return;
      document.getElementById('resNumero').textContent = resp.numeroOrcamento || '-';
      const pdf = document.getElementById('resPdf');
      const whats = document.getElementById('resWhats');

      if (resp.linkPdf) {
        pdf.href = resp.linkPdf;
        pdf.textContent = resp.linkPdf;
      } else {
        pdf.removeAttribute('href');
        pdf.textContent = 'Não informado';
      }

      if (resp.linkWhats) {
        whats.href = resp.linkWhats;
        whats.textContent = resp.linkWhats;
      } else {
        whats.removeAttribute('href');
        whats.textContent = 'Não informado';
      }

      box.classList.add('show');
    }

    async function enviarOrcamento_() {
      const btn = document.getElementById('btnGerar');
      const payload = coletarPayload_();
      const erro = validarPayload_(payload);
      if (erro) {
        setStatus_(erro, 'err');
        return;
      }

      try {
        setProcessing_(true, 'Iniciando processamento...');
        iniciarFasesProcessing_();
        setStatus_('Gerando orçamento...', 'info');
        const resp = await Auth.apiCall('gerarOrcamentoInterno', payload);
        if (!resp || resp.sucesso !== true) {
          throw new Error(resp && (resp.mensagem || resp.error) ? (resp.mensagem || resp.error) : 'Falha ao gerar orçamento');
        }
        renderResultado_(resp);
        setStatus_(resp.mensagem || 'Orçamento gerado com sucesso.', 'ok');
      } catch (err) {
        console.error(err);
        setStatus_('Falha ao gerar orçamento: ' + (err.message || err), 'err');
      } finally {
        setProcessing_(false, '');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      preencherHeaderLocal_();
      const btnGerar = document.getElementById('btnGerar');
      const btnLimpar = document.getElementById('btnLimpar');
      const btnOpenPdf = document.getElementById('btnOpenPdf');
      const btnOpenWhats = document.getElementById('btnOpenWhats');
      const btnCopyPdf = document.getElementById('btnCopyPdf');
      const btnCopyWhats = document.getElementById('btnCopyWhats');
      const tel = document.getElementById('telefone');
      const valores = ['valorPocket', 'valorGold', 'valorPremium']
        .map(id => document.getElementById(id))
        .filter(Boolean);

      if (tel) {
        tel.addEventListener('input', function(e) {
          e.target.value = formatarTelefoneMascara_(e.target.value);
        });
      }

      valores.forEach(function(el) {
        el.addEventListener('input', function(e) {
          const limpo = String(e.target.value || '')
            .replace(/[^\d.,]/g, '')
            .replace(/(,.*),/g, '$1');
          e.target.value = limpo;
        });
        el.addEventListener('blur', function(e) {
          e.target.value = formatarValorVisual_(e.target.value);
        });
      });

      if (btnGerar) btnGerar.addEventListener('click', enviarOrcamento_);
      if (btnLimpar) btnLimpar.addEventListener('click', limparFormulario_);
      if (btnOpenPdf) btnOpenPdf.addEventListener('click', function() {
        const url = (document.getElementById('resPdf') || {}).href || '';
        abrirLinkExterno_(url);
      });
      if (btnOpenWhats) btnOpenWhats.addEventListener('click', function() {
        const url = (document.getElementById('resWhats') || {}).href || '';
        abrirLinkExterno_(url);
      });
      if (btnCopyPdf) btnCopyPdf.addEventListener('click', function() {
        const url = (document.getElementById('resPdf') || {}).href || '';
        copiarTexto_(url, 'Link do PDF copiado.');
      });
      if (btnCopyWhats) btnCopyWhats.addEventListener('click', function() {
        const url = (document.getElementById('resWhats') || {}).href || '';
        copiarTexto_(url, 'Link do WhatsApp copiado.');
      });
      if (window.lucide) window.lucide.createIcons();
    });

    window.addEventListener('load', async () => {
      try {
        if (!window.Auth) throw new Error('AUTH_NOT_LOADED');
        const auth = await Auth.apiCall('verificarUsuario');
        if (!auth || !auth.ok || !auth.user) throw new Error('NOT_AUTH');
        if (!isPerfilLiberado(auth.user.perfil)) {
          alert('Você não tem permissão para acessar esta área.');
          window.location.href = 'index.html';
          return;
        }
        const nome = String(auth.user.nome || auth.user.email || '').trim();
        if (nome) {
          localStorage.setItem('auth_nome', nome);
          preencherHeaderLocal_();
        }
      } catch (err) {
        console.error('Falha de autenticação:', err);
        alert('Sessão inválida. Faça login novamente.');
        window.location.href = 'index.html';
      } finally {
        if (window.lucide) window.lucide.createIcons();
      }
    });
  </script>
</body>
