<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1a2e"/>
  <meta name="application-name" content="Sistema Super Agenda"/>
  <meta name="apple-mobile-web-app-title" content="Super Agenda"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="msapplication-TileColor" content="#0f1a2e"/>
  <link rel="manifest" href="site.webmanifest"/>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48.png"/>
  <link rel="icon" type="image/png" sizes="96x96" href="img/favicon-96x96.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png"/>
  <title>Agenda Semanal</title>

  <script src="auth.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --navy-900: #0a1628;
      --navy-800: #0f1a2e;
      --navy-600: #1e3a5f;
      --gold-500: #d4a853;
      --gold-400: #e0bc6a;
      --gray-50: #f8f9fc;
      --gray-100: #f1f3f8;
      --gray-200: #e2e6ef;
      --gray-300: #cdd3e0;
      --gray-500: #6b7490;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --success: #10b981;
      --danger: #ef4444;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(10,22,40,0.06);
      --shadow-md: 0 6px 20px rgba(10,22,40,0.10);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--gray-50);
      color: var(--gray-800);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 24px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--navy-800);
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .header-left i { color: var(--gold-400); width: 18px; height: 18px; }
    .header-title { font-size: 15px; font-weight: 700; }

    .user-chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 4px 10px 4px 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--navy-600), rgba(58,96,152,0.8));
      color: var(--gold-400);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .user-meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
      line-height: 1.15;
    }

    .user-name {
      font-size: 12px;
      color: rgba(255,255,255,0.9);
      font-weight: 600;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-role {
      font-size: 10px;
      color: var(--gold-400);
      font-weight: 600;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logout {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-logout i,
    .header-logout svg {
      width: 16px;
      height: 16px;
      color: rgba(255,255,255,0.85);
    }

    .header-logout:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.35);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
    }

    .panel {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }

    .panel-head {
      padding: 14px 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--navy-800);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title i { width: 16px; height: 16px; color: var(--gold-500); }

    .panel-body { padding: 14px 16px; }

    .period-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-500);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    input, textarea, button {
      font-family: var(--font);
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      padding: 10px 11px;
      font-size: 13px;
      color: var(--gray-800);
      background: #fff;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--navy-600);
      box-shadow: 0 0 0 3px rgba(30,58,95,0.10);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s ease;
    }

    .btn.primary {
      background: var(--navy-600);
      color: #fff;
    }
    .btn.primary:hover { filter: brightness(1.06); }

    .btn.secondary {
      background: #fff;
      color: var(--gray-700);
      border: 1px solid var(--gray-300);
    }
    .btn.secondary:hover { background: var(--gray-100); }

    .btn.success {
      background: var(--success);
      color: #fff;
    }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }

    .status.show { display: block; }
    .status.info { background: #e8f3ff; color: #0b5394; border: 1px solid #cae3ff; }
    .status.ok { background: #eafaf3; color: #0f6a43; border: 1px solid #c8f0dc; }
    .status.err { background: #fdeeee; color: #8b1e1e; border: 1px solid #f8cfcf; }

    .events-scroll {
      max-height: calc(100vh - 270px);
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 3px;
    }

    .event-card {
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      box-shadow: var(--shadow-sm);
    }

    .event-top {
      display: grid;
      grid-template-columns: 1.2fr .9fr .9fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .event-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--navy-800);
      margin-bottom: 6px;
    }

    .event-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .event-long {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .preview-box {
      min-height: calc(100vh - 260px);
      background: #0f1728;
      color: #e8edf8;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .pill {
      font-size: 11px;
      color: #fff;
      background: #23406d;
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 700;
    }

    .empty {
      text-align: center;
      color: var(--gray-500);
      font-size: 13px;
      padding: 24px 8px;
      border: 1px dashed var(--gray-300);
      border-radius: 10px;
    }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
      .events-scroll { max-height: none; }
      .preview-box { min-height: 280px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left" onclick="window.location.href='index.html'">
      <i data-lucide="arrow-left"></i>
      <i data-lucide="calendar-range"></i>
      <span class="header-title">Agenda Semanal (WhatsApp)</span>
    </div>
    <div class="header-right">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">--</div>
        <div class="user-meta">
          <div class="user-name" id="userName">...</div>
          <div class="user-role" id="userRole">...</div>
        </div>
      </div>
      <button class="header-logout" onclick="Auth.logout()" title="Sair">
        <i data-lucide="log-out"></i>
      </button>
    </div>
  </div>

  <div class="wrap">
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title"><i data-lucide="sliders-horizontal"></i>Configurar e Revisar</div>
        <span class="pill" id="pillCount">0 eventos</span>
      </div>
      <div class="panel-body">
        <div class="btn-row" style="margin-bottom:10px;">
          <button class="btn secondary" id="btnSemanaAtual">Semana Atual</button>
          <button class="btn secondary" id="btnProximaSemana">Próxima Semana</button>
        </div>

        <div class="period-grid">
          <div>
            <label for="dataInicio">Data início</label>
            <input type="date" id="dataInicio">
          </div>
          <div>
            <label for="dataFim">Data fim</label>
            <input type="date" id="dataFim">
          </div>
        </div>

        <div class="btn-row" style="margin-bottom:12px;">
          <button class="btn primary" id="btnCarregar">Carregar Eventos</button>
          <button class="btn success" id="btnGerarTexto">Gerar Texto WhatsApp</button>
        </div>

        <div class="status" id="status"></div>

        <div class="events-scroll" id="eventsScroll">
          <div class="empty">Carregue um período para revisar os eventos.</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title"><i data-lucide="message-square-text"></i>Texto Final</div>
        <button class="btn secondary" id="btnCopiar">Copiar</button>
      </div>
      <div class="panel-body">
        <div class="preview-box" id="previewBox">O texto final da agenda aparecerá aqui.</div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      eventos: [],
      periodo: {
        dataInicio: '',
        dataFim: ''
      }
    };

    window.addEventListener('load', async () => {
      try {
        if (!window.Auth) throw new Error('AUTH_NOT_LOADED');

        // Preenche cabeçalho imediatamente com cache local (evita atraso visual).
        preencherHeaderUsuarioLocal_();

        const auth = await Auth.apiCall('verificarUsuario');
        if (!auth || !auth.ok || !auth.user) {
          throw new Error('NOT_AUTH');
        }

        const perfil = String(auth.user.perfil || '');
        if (!ehPerfilGestorGerador_(perfil)) {
          alert('Você não tem permissão para acessar esta área.');
          window.location.href = 'index.html';
          return;
        }

        const nomeCompleto = String(auth.user.nome || auth.user.email || '');
        const perfilExibicao = perfilExibicaoGerador_(auth.user.perfil || '');
        const partes = nomeCompleto.split(' ').filter(Boolean);
        const iniciais = partes.length >= 2
          ? (partes[0][0] + partes[partes.length - 1][0]).toUpperCase()
          : (nomeCompleto.slice(0, 2).toUpperCase() || 'US');

        document.getElementById('userAvatar').textContent = iniciais;
        document.getElementById('userName').textContent = partes[0] || nomeCompleto;
        document.getElementById('userRole').textContent = perfilExibicao;
        configurarAcoes();
        aplicarPeriodoInicial_();
        mostrarStatus('Escolha o período e clique em "Carregar Eventos".', 'info');
        if (window.lucide) window.lucide.createIcons();
      } catch (err) {
        console.error('Erro ao iniciar GerarAgenda:', err);
        alert('Sessão inválida ou acesso não autorizado.');
        window.location.href = 'index.html';
      }
    });

    function normalizarPerfilGerador_(perfil) {
      return String(perfil || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toLowerCase();
    }

    function ehPerfilGestorGerador_(perfil) {
      const p = normalizarPerfilGerador_(perfil);
      return p === 'proprietario' || p === 'socio' || p === 'administrador' || p === 'admin';
    }

    function perfilExibicaoGerador_(perfil) {
      const p = normalizarPerfilGerador_(perfil);
      if (p === 'proprietario') return 'Proprietário';
      if (p === 'administrador' || p === 'admin') return 'Administrador';
      if (p === 'socio') return 'Administrador';
      if (p === 'musico') return 'Músico';
      return perfil || 'Usuário';
    }

    function preencherHeaderUsuarioLocal_() {
      try {
        const nomeCache = String(localStorage.getItem('auth_nome') || '').trim();
        const perfilCache = String(localStorage.getItem('auth_perfil') || '').trim();
        if (!nomeCache && !perfilCache) return;

        const partes = nomeCache.split(' ').filter(Boolean);
        const iniciais = partes.length >= 2
          ? (partes[0][0] + partes[partes.length - 1][0]).toUpperCase()
          : (nomeCache.slice(0, 2).toUpperCase() || 'US');

        const avatarEl = document.getElementById('userAvatar');
        const nomeEl = document.getElementById('userName');
        const perfilEl = document.getElementById('userRole');

        if (avatarEl) avatarEl.textContent = iniciais;
        if (nomeEl) nomeEl.textContent = partes[0] || nomeCache || 'Usuário';
        if (perfilEl) perfilEl.textContent = perfilExibicaoGerador_(perfilCache);
      } catch (_) {}
    }

    function aplicarPeriodoInicial_() {
      const hoje = new Date();
      const diaSemana = hoje.getDay();
      const deslocamento = (diaSemana + 6) % 7; // segunda-feira = início
      const inicio = new Date(hoje);
      inicio.setDate(hoje.getDate() - deslocamento);
      inicio.setHours(0, 0, 0, 0);

      const fim = new Date(inicio);
      fim.setDate(inicio.getDate() + 6);

      const iso = (d) => {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      };

      state.periodo.dataInicio = iso(inicio);
      state.periodo.dataFim = iso(fim);
      document.getElementById('dataInicio').value = state.periodo.dataInicio;
      document.getElementById('dataFim').value = state.periodo.dataFim;
    }

    function configurarAcoes() {
      document.getElementById('btnSemanaAtual').addEventListener('click', () => carregarPreset('semana_atual'));
      document.getElementById('btnProximaSemana').addEventListener('click', () => carregarPreset('proxima_semana'));
      document.getElementById('btnCarregar').addEventListener('click', carregarPeriodoManual);
      document.getElementById('btnGerarTexto').addEventListener('click', gerarTextoFinal);
      document.getElementById('btnCopiar').addEventListener('click', copiarTextoFinal);
    }

    async function carregarPreset(preset) {
      mostrarStatus('Carregando eventos do período...', 'info');
      const resp = await Auth.apiCall('carregarAgendaSemanalPreview', { preset: preset });
      aplicarRespostaPreview(resp);
      mostrarStatus('Eventos carregados. Revise e ajuste se necessário.', 'ok');
    }

    async function carregarPeriodoManual() {
      const dataInicio = document.getElementById('dataInicio').value;
      const dataFim = document.getElementById('dataFim').value;

      if (!dataInicio || !dataFim) {
        mostrarStatus('Preencha data início e data fim.', 'err');
        return;
      }
      if (dataInicio > dataFim) {
        mostrarStatus('Data início deve ser menor ou igual à data fim.', 'err');
        return;
      }

      try {
        mostrarStatus('Carregando período personalizado...', 'info');
        const resp = await Auth.apiCall('carregarAgendaSemanalPreview', {
          dataInicio: dataInicio,
          dataFim: dataFim
        });
        aplicarRespostaPreview(resp);
        mostrarStatus('Período carregado com sucesso.', 'ok');
      } catch (err) {
        console.error(err);
        mostrarStatus('Falha ao carregar período: ' + (err.message || err), 'err');
      }
    }

    function aplicarRespostaPreview(resp) {
      if (!resp || resp.sucesso !== true) {
        throw new Error(resp && resp.mensagem ? resp.mensagem : 'Falha ao carregar agenda');
      }

      state.periodo.dataInicio = resp.periodo && resp.periodo.dataInicioISO ? resp.periodo.dataInicioISO : '';
      state.periodo.dataFim = resp.periodo && resp.periodo.dataFimISO ? resp.periodo.dataFimISO : '';
      state.eventos = Array.isArray(resp.eventos) ? resp.eventos : [];

      document.getElementById('dataInicio').value = state.periodo.dataInicio;
      document.getElementById('dataFim').value = state.periodo.dataFim;

      renderEventosEditaveis();
      document.getElementById('previewBox').textContent = 'Clique em "Gerar Texto WhatsApp" para montar a versão final.';
    }

    function renderEventosEditaveis() {
      const wrap = document.getElementById('eventsScroll');
      const pill = document.getElementById('pillCount');
      const total = state.eventos.length;
      pill.textContent = total + (total === 1 ? ' evento' : ' eventos');

      if (!total) {
        wrap.innerHTML = '<div class="empty">Nenhum evento no período selecionado.</div>';
        return;
      }

      wrap.innerHTML = state.eventos.map((ev, idx) => {
        return `
          <article class="event-card" data-idx="${idx}">
            <div class="event-title">${escapeHtml(ev.diaSemana || '')} ${escapeHtml(ev.dataBR || '')} • ${escapeHtml(ev.horaInicio || '--:--')} às ${escapeHtml(ev.horaFim || '--:--')}</div>
            <div class="event-top">
              <div>
                <label>Tipo do evento</label>
                <input data-k="tipoEvento" value="${escapeAttr(ev.tipoEvento || '')}">
              </div>
              <div>
                <label>Início</label>
                <input data-k="horaInicio" value="${escapeAttr(ev.horaInicio || '')}">
              </div>
              <div>
                <label>Fim</label>
                <input data-k="horaFim" value="${escapeAttr(ev.horaFim || '')}">
              </div>
            </div>
            <div class="event-meta">
              <div>
                <label>Contratante</label>
                <input data-k="contratante" value="${escapeAttr(ev.contratante || '')}">
              </div>
              <div>
                <label>Formato</label>
                <input data-k="formato" value="${escapeAttr(ev.formato || '')}">
              </div>
              <div>
                <label>Look</label>
                <input data-k="look" value="${escapeAttr(ev.look || '')}">
              </div>
              <div>
                <label>Som</label>
                <input data-k="somResponsavel" value="${escapeAttr(ev.somResponsavel || '')}">
              </div>
            </div>
            <div class="event-long">
              <div>
                <label>Local</label>
                <input data-k="local" value="${escapeAttr(ev.local || '')}">
              </div>
              <div>
                <label>Link Maps</label>
                <input data-k="linkMaps" value="${escapeAttr(ev.linkMaps || '')}">
              </div>
              <div>
                <label>Cerimonial</label>
                <input data-k="cerimonialista" value="${escapeAttr(ev.cerimonialista || '')}">
              </div>
              <div>
                <label>Observações</label>
                <textarea data-k="observacoes">${escapeHtml(ev.observacoes || '')}</textarea>
              </div>
            </div>
          </article>
        `;
      }).join('');

      wrap.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('input', onEditarCampoEvento);
      });
    }

    function onEditarCampoEvento(e) {
      const card = e.target.closest('.event-card');
      if (!card) return;
      const idx = Number(card.getAttribute('data-idx'));
      if (isNaN(idx) || !state.eventos[idx]) return;
      const key = e.target.getAttribute('data-k');
      if (!key) return;
      state.eventos[idx][key] = e.target.value;
    }

    async function gerarTextoFinal() {
      try {
        const dataInicio = document.getElementById('dataInicio').value || state.periodo.dataInicio;
        const dataFim = document.getElementById('dataFim').value || state.periodo.dataFim;

        if (!dataInicio || !dataFim) {
          mostrarStatus('Defina um período válido antes de gerar o texto.', 'err');
          return;
        }

        mostrarStatus('Gerando texto final...', 'info');

        const resp = await Auth.apiCall('gerarTextoAgendaSemanal', {
          dataInicio: dataInicio,
          dataFim: dataFim,
          eventosJson: JSON.stringify(state.eventos)
        });

        if (!resp || resp.sucesso !== true) {
          throw new Error(resp && resp.mensagem ? resp.mensagem : 'Falha ao gerar texto');
        }

        document.getElementById('previewBox').textContent = resp.texto || '';
        mostrarStatus('Texto final gerado. Revise e copie para o WhatsApp.', 'ok');
      } catch (err) {
        console.error(err);
        mostrarStatus('Erro ao gerar texto: ' + (err.message || err), 'err');
      }
    }

    async function copiarTextoFinal() {
      const texto = document.getElementById('previewBox').textContent || '';
      if (!texto || texto === 'O texto final da agenda aparecerá aqui.') {
        mostrarStatus('Gere o texto antes de copiar.', 'err');
        return;
      }

      try {
        await navigator.clipboard.writeText(texto);
        mostrarStatus('Texto copiado para a área de transferência.', 'ok');
      } catch (err) {
        console.error(err);
        mostrarStatus('Não foi possível copiar automaticamente. Copie manualmente.', 'err');
      }
    }

    function mostrarStatus(msg, tipo) {
      const box = document.getElementById('status');
      box.className = 'status show ' + (tipo || 'info');
      box.textContent = msg || '';
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/`/g, '&#96;');
    }
  </script>
</body>
</html>
